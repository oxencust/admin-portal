<style>
:root{--green:#7ac19a;--green-dark:#5a9a7a;--green-light:#e8f5ee;--pink:#f2ac98;--pink-light:#fce8e2;--pink-dark:#c67566;--blue:#9fcccc;--blue-light:#e4f2f2;--blue-dark:#6ba3a3;--yellow:#ffe08b;--card:#fff;--text:#333;--text-secondary:#666;--text-muted:#999;--border:#e5e5e5;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans TC',sans-serif;background:linear-gradient(135deg,#e2ede6 0%,#daedec 30%,#faece8 60%,#fcf4e3 100%);background-attachment:fixed;color:var(--text);min-height:100vh;}
.top-card{max-width:600px;margin:12px auto 0;padding:0 12px;}
.top-inner{background:white;border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,0.06);}
.top-main{display:flex;justify-content:space-between;align-items:flex-start;}
.top-main h1{font-size:18px;font-weight:700;color:var(--green-dark);}
.top-sub{font-size:11px;color:var(--text-muted);margin-top:2px;}
.user-badge{display:flex;align-items:center;gap:6px;background:var(--green-light);padding:4px 10px 4px 6px;border-radius:20px;}
.user-avatar{width:24px;height:24px;border-radius:50%;background:var(--green);color:white;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.user-name{font-size:12px;font-weight:600;color:var(--green-dark);}
.quick-stats{display:flex;gap:8px;margin-top:12px;}
.qs{flex:1;background:#f8faf8;border-radius:10px;padding:8px 6px;text-align:center;}
.qs-num{font-size:18px;font-weight:900;color:var(--green-dark);}
.qs-label{font-size:9px;color:var(--text-muted);margin-top:1px;white-space:nowrap;}
.filter-bar{max-width:600px;margin:10px auto 0;padding:0 12px;display:flex;flex-wrap:wrap;gap:6px;}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:white;color:var(--text-secondary);cursor:pointer;white-space:nowrap;transition:all 0.2s;}
.filter-chip.active{background:var(--green);color:white;border-color:var(--green);}
.filter-chip .cnt{background:rgba(0,0,0,0.08);padding:1px 6px;border-radius:8px;font-size:10px;margin-left:4px;}
.filter-chip.active .cnt{background:rgba(255,255,255,0.3);}
.action-bar{max-width:600px;margin:8px auto 0;padding:0 12px;display:flex;gap:8px;align-items:center;}
.search-input{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:12px;font-size:14px;font-family:inherit;outline:none;background:white;}
.search-input:focus{border-color:var(--green);}
.btn{padding:10px 16px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s;display:flex;align-items:center;gap:6px;white-space:nowrap;}
.btn:active{transform:scale(0.96);}
.btn-primary{background:linear-gradient(135deg,var(--green-dark),var(--green));color:white;box-shadow:0 2px 8px rgba(122,193,154,0.3);}
.btn-secondary{background:var(--blue-light);color:var(--blue-dark);}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:8px;}
.card-list{max-width:600px;margin:10px auto 0;padding:0 12px 100px;}
.a-card{background:white;border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,0.04);border-left:4px solid var(--green);transition:all 0.2s;cursor:pointer;}
.a-card.inactive{border-left-color:#ccc;opacity:0.7;}
.a-card:active{transform:scale(0.995);}
.a-top{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.a-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;}
.a-avatar.admin{background:linear-gradient(135deg,var(--green-light),#a5d6a7);color:var(--green-dark);}
.a-avatar.staff{background:linear-gradient(135deg,var(--blue-light),#bbdefb);color:var(--blue-dark);}
.a-avatar.viewer{background:linear-gradient(135deg,#f5f5f5,#e0e0e0);color:#999;}
.a-info{flex:1;min-width:0;}
.a-name{font-size:16px;font-weight:700;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.a-meta{font-size:12px;color:var(--text-muted);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap;}
.a-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;}
.a-tag{padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;}
.a-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;font-size:14px;}
.a-field{display:flex;gap:4px;align-items:baseline;}.a-field-label{color:var(--text-muted);white-space:nowrap;font-size:12px;}.a-field-value{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.a-field.full{grid-column:1/-1;}
.a-expand{display:none;margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);}
.a-card.expanded .a-expand{display:block;}
.a-expand-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;font-size:14px;}
.a-actions{margin-top:10px;display:flex;gap:8px;justify-content:flex-end;}
.a-toggle{text-align:center;margin-top:6px;font-size:10px;color:var(--green);font-weight:600;}
.a-card.expanded .a-toggle{display:none;}
.badge{padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;}
.badge-super{background:linear-gradient(135deg,#fff8e1,#ffe082);color:#e65100;}.badge-admin{background:var(--green-light);color:var(--green-dark);}
.badge-staff{background:var(--blue-light);color:var(--blue-dark);}.badge-viewer{background:#f5f5f5;color:#999;}
.badge-active{background:var(--green-light);color:var(--green-dark);}.badge-inactive{background:#ffebee;color:#c62828;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-bg.show{display:flex;}
.modal-panel{width:100%;max-width:500px;max-height:92vh;background:white;border-radius:20px 20px 0 0;overflow-y:auto;animation:slideUp 0.3s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:white;z-index:10;}
.modal-head h2{font-size:16px;font-weight:700;}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted);padding:4px 8px;}
.modal-body{padding:20px;padding-bottom:100px;}
.modal-footer{display:none;position:fixed;bottom:0;left:0;right:0;padding:12px 20px;background:white;border-top:1px solid var(--border);gap:10px;z-index:10;justify-content:flex-end;}
.modal-bg.show .modal-footer{display:flex;}
.form-group{margin-bottom:14px;}.form-label{font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;display:block;}
.form-input,.form-textarea,.form-select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:border-color 0.2s;}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--green);}
.form-textarea{min-height:70px;resize:vertical;}
.form-hint{font-size:11px;color:var(--text-muted);margin-top:-8px;margin-bottom:12px;}
.detail-section{margin-bottom:16px;}.detail-section-title{font-size:12px;font-weight:700;color:var(--green-dark);margin-bottom:8px;padding-bottom:6px;border-bottom:1.5px solid var(--green-light);}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}.detail-field{font-size:13px;}.detail-field.full{grid-column:1/-1;}
.detail-field-label{font-size:10px;color:var(--text-muted);margin-bottom:1px;}.detail-field-value{font-weight:500;}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);}.empty-icon{font-size:48px;margin-bottom:12px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:white;padding:10px 20px;border-radius:10px;font-size:13px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;max-width:90%;text-align:center;}.toast.show{opacity:1;}
@media(min-width:769px){.modal-bg{align-items:center;}.modal-panel{border-radius:20px;max-height:85vh;}.modal-footer{position:sticky;bottom:0;}}
</style>
</head>
<body>
<div class="top-card"><div class="top-inner">
    <div class="top-main"><div><h1>👥 營運人員管理</h1><div class="top-sub" id="topSub">載入中...</div></div><div class="user-badge"><div class="user-avatar" id="userAvatar">?</div><span class="user-name" id="staffName">-</span></div></div>

</div></div>
<div class="filter-bar" id="filterBar"></div>
<div class="action-bar"><input type="text" class="search-input" id="searchInput" placeholder="🔍 搜尋姓名、暱稱..." oninput="handleSearch()"><button class="btn btn-primary" id="addBtn" onclick="openAddModal()" style="display:none;">+ 新增</button></div>

<div class="modal-bg" id="inviteLinkModal"><div class="modal-panel" style="max-width:420px;"><div class="modal-head"><h2>✅ 新增完成</h2><button class="modal-close" onclick="closeModal('inviteLinkModal')">✕</button></div><div class="modal-body" id="inviteLinkBody" style="text-align:center;"></div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('inviteLinkModal')">關閉</button></div></div></div>
<div class="modal-bg" id="resumeModal"><div class="modal-panel"><div class="modal-head"><h2 id="resumeTitle">📄 原始履歷</h2><button class="modal-close" onclick="closeModal('resumeModal')">✕</button></div><div class="modal-body" id="resumeBody"><div class="empty-state"><div class="empty-icon">⏳</div><p>載入中...</p></div></div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('resumeModal')">關閉</button></div></div></div>
<div class="toast" id="toast"></div>
<script>
// 2026-05-15 Wave 5 #9 cutover：admin-api → Zeabur (admin-hendia)
// rollback: 改回 'https://mnjilhpztnowaplggvkk.supabase.co/functions/v1/admin-api'
const EDGE_FUNCTION_URL='https://admin-hendia.zeabur.app/';
const RESUME_API_URL='https://resume-hendia.zeabur.app/';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1uamlsaHB6dG5vd2FwbGdndmtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU3MDA0ODYsImV4cCI6MjA4MTI3NjQ4Nn0.X3e9DF3iT2KUR9ma3_Ins01vG607R155v0xia8hO_Qg';
async function callEdge(action, params = {}) {
  // ── Sprint 0 Phase 1 + Phase 3: staffLineUid + LINE ID Token ──
  let _uid = null;
  let _idToken = null;
  try {
    _uid = sessionStorage.getItem('staffLineUid');
    if (!_uid) {
      const _st = JSON.parse(sessionStorage.getItem('currentStaff') || 'null');
      _uid = _st?.lineUid || _st?.line_id_edu || null;
    }
    // Phase 1 補強: 新分頁開時 sessionStorage 不共享 → 退到 URL params
    if (!_uid) {
      const _u = new URLSearchParams(location.search);
      _uid = _u.get('line_id_edu') || _u.get('uid') || null;
    }
  } catch(e) {}
  try {
    // Phase 3: 帶上 LINE ID Token (有 LIFF 就拿新的，否則用 sessionStorage 快取)
    if (window.liff && liff.isLoggedIn && liff.isLoggedIn()) {
      _idToken = liff.getIDToken();
      if (_idToken) sessionStorage.setItem('staffIdToken', _idToken);
    }
    if (!_idToken) _idToken = sessionStorage.getItem('staffIdToken');
    // Phase 3 hotfix: 過期 token 不送（permissive fallback to lineUid）
    if (_idToken) {
      try {
        const _p = JSON.parse(atob(_idToken.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
        if (_p.exp && _p.exp * 1000 < Date.now()) _idToken = null;
      } catch(e) { _idToken = null; }
    }
  } catch(e) {}
  const _body = { action, ...(params || {}) };
  if (_uid && !_body.lineUid) _body.lineUid = _uid;
  const _headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY, 'apikey': SUPABASE_ANON_KEY };
  if (_idToken) _headers['X-Line-IdToken'] = _idToken;
  const res = await fetch(EDGE_FUNCTION_URL, {
    method: 'POST',
    headers: _headers,
    body: JSON.stringify(_body)
  });
  if (!res.ok) throw new Error('Edge Function error: ' + res.status);
  return res.json();
}
let currentUser=null,modulePerms={view:false,fill:false,edit:false,create:false,delete:false,export:false},fieldPerms={};
let allStaff=[],archivedStaff=[],filteredStaff=[],searchTerm='',searchTimeout=null,editingStaff=null,currentFilter='all';
const roleNames={owner:'老闆',super_admin:'最高管理員',admin:'部門主管',manager:'部門主管',staff:'營運人員',employee:'營運人員',viewer:'檢視者',analyst:'分析師',coach:'教練'};
const roleBadge={owner:'badge-super',super_admin:'badge-super',admin:'badge-admin',manager:'badge-admin',staff:'badge-staff',employee:'badge-staff',viewer:'badge-viewer',analyst:'badge-viewer',coach:'badge-staff'};
const roleAvatar={owner:'admin',super_admin:'admin',admin:'admin',manager:'admin',staff:'staff',employee:'staff',viewer:'viewer',analyst:'viewer',coach:'staff'};
/* v3：組織位置（org_role）— 與權限欄位完全分離，只影響組織圖長相 */
const orgRoleNames={ceo:'CEO',dept_head:'部門主管',sub_dept_head:'子部門組長',staff:'—'};
const orgRoleChipStyle={
  ceo:'background:#fff3e0;color:#e65100;border:1px solid #ffcc80;',
  dept_head:'background:#e3f2fd;color:#1565c0;border:1px solid #90caf9;',
  sub_dept_head:'background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;',
  staff:''
};
const genderNames={'male':'男','female':'女','男':'男','女':'女','other':'其他'};
const genderNorm=g=>({male:'male',female:'female',other:'other','男':'male','女':'female','其他':'other'}[g]||'');

function initPermissions(){
    try{currentUser=JSON.parse(sessionStorage.getItem('currentStaff'));}catch(e){}
    // ── Sprint 0 Task 3.2: 移除 URL ?uid=&role= 後門 ──
    if(!currentUser){document.getElementById('staffList').innerHTML='<div class="empty-state"><div class="empty-icon">🔒</div><p>請先登入</p></div>';return false;}
    document.getElementById('staffName').textContent=currentUser.name;
    document.getElementById('userAvatar').textContent=(currentUser.name||'?')[0];
    if(currentUser.permission_level==='super_admin'||currentUser.permission_level==='owner'||currentUser.role==='owner'||currentUser.role==='super_admin'||currentUser.permissions==='all'){modulePerms={view:true,fill:true,edit:true,create:true,delete:false,export:true};}
    else{modulePerms=(currentUser.permissions&&currentUser.permissions['staff-manage'])||{view:false};}
    if(currentUser.permission_level==='super_admin'||currentUser.permission_level==='owner'||currentUser.role==='owner'||currentUser.role==='super_admin'){fieldPerms={};}else{fieldPerms=(currentUser.fieldPermissions&&currentUser.fieldPermissions['staff-manage'])||{};}
    try{if(window.parent&&window.parent.getModulePermissions)modulePerms=window.parent.getModulePermissions('staff-manage');if(window.parent&&window.parent.getFieldPermissions)fieldPerms=window.parent.getFieldPermissions('staff-manage');}catch(e){}
    if(modulePerms.fill===undefined)modulePerms.fill=modulePerms.edit||false;
    if(modulePerms.create)document.getElementById('addBtn').style.display='flex';
    if(!modulePerms.view){document.getElementById('staffList').innerHTML='<div class="empty-state"><div class="empty-icon">🔒</div><p>無權限</p></div>';return false;}
    return true;
}
function isVis(f){const p=fieldPerms[f];return p===undefined||p===true||p==='masked';}
function isFull(f){const p=fieldPerms[f];return p===undefined||p===true;}
function getFD(f,v,mt){const p=fieldPerms[f];if(p===undefined||p===true)return escHtml(v||'-');if(p===false)return'<span style="color:#ccc;font-size:11px;">無權限</span>';if(p==='masked'){if(!v)return'-';const s=String(v);if(mt==='phone'&&s.length>=7)return escHtml(s.substring(0,4)+'***'+s.substring(s.length-3));return escHtml(s[0]+'***'+s[s.length-1]);}return escHtml(v||'-');}

async function loadStaff(){
    try{
        const{data,error}=await callEdge('getStaff').then(r=>({data:r.data,error:null})).catch(e=>({data:null,error:e}));
        if(error)throw error;
        const all=data||[];
        allStaff=all.filter(s=>s.status!=='封存');
        archivedStaff=all.filter(s=>s.status==='封存');
        document.getElementById('topSub').textContent='共 '+allStaff.length+' 位人員';
        renderStats();renderFilters();applyFilter();
    }catch(e){document.getElementById('staffList').innerHTML='<div class="empty-state"><div class="empty-icon">❌</div><p>載入失敗</p></div>';}
}
function renderStats(){
    const active=allStaff.filter(s=>s.status!=='inactive').length;
    const roles={};allStaff.forEach(s=>{const r=s.permission_level||'staff';roles[r]=(roles[r]||0)+1;});
    document.getElementById('quickStats').innerHTML=
        '<div class="qs"><div class="qs-num">'+active+'</div><div class="qs-label">在職</div></div>'+
        '<div class="qs"><div class="qs-num">'+(roles.super_admin||0)+'</div><div class="qs-label">超級管理</div></div>'+
        '<div class="qs"><div class="qs-num">'+(roles.admin||0)+'</div><div class="qs-label">管理員</div></div>'+
        '<div class="qs"><div class="qs-num">'+((roles.staff||0)+(roles.viewer||0))+'</div><div class="qs-label">營運/檢視</div></div>';
}
function renderFilters(){
    const types={};allStaff.forEach(s=>{(s.staff_type||'').split(',').forEach(t=>{t=t.trim();if(t)types[t]=(types[t]||0)+1;});});
    let h='<span class="filter-chip active" onclick="setFilter(\'all\',this)">全部<span class="cnt">'+allStaff.length+'</span></span>';
    h+='<span class="filter-chip" onclick="setFilter(\'active\',this)">在職<span class="cnt">'+allStaff.filter(s=>s.status!=='inactive').length+'</span></span>';
    Object.keys(types).forEach(t=>{h+='<span class="filter-chip" onclick="setFilter(\'type:'+t+'\',this)">'+escHtml(t)+'<span class="cnt">'+types[t]+'</span></span>';});
    if(currentUser&&(currentUser.permission_level==='super_admin'||currentUser.permission_level==='owner'||currentUser.role==='owner'||currentUser.role==='super_admin')&&archivedStaff.length>0){h+='<span class="filter-chip" style="border-color:#ffcdd2;color:#c62828;" onclick="setFilter(\'archived\',this)">📦 封存<span class="cnt">'+archivedStaff.length+'</span></span>';}
    document.getElementById('filterBar').innerHTML=h;
}
function setFilter(f,el){currentFilter=f;document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');applyFilter();}
function applyFilter(){
    if(currentFilter==='archived'){
        filteredStaff=archivedStaff.filter(s=>{
            if(searchTerm&&!((s.name||'').includes(searchTerm)||(s.nickname||'').includes(searchTerm)||(s.id||'').includes(searchTerm)))return false;
            return true;
        });
    }else{
        filteredStaff=allStaff.filter(s=>{
            if(currentFilter==='active'&&s.status==='inactive')return false;
            if(currentFilter.startsWith('type:')){const ft=currentFilter.substring(5);const ts=(s.staff_type||'').split(',').map(x=>x.trim());if(!ts.includes(ft))return false;}
            if(searchTerm&&!((s.name||'').includes(searchTerm)||(s.nickname||'').includes(searchTerm)||(s.id||'').includes(searchTerm)))return false;
            return true;
        });
    }
    renderStaff();
}
function handleSearch(){if(searchTimeout)clearTimeout(searchTimeout);searchTimeout=setTimeout(()=>{searchTerm=document.getElementById('searchInput').value.trim();applyFilter();},300);}

function renderStaff(){
    const c=document.getElementById('staffList');
    if(filteredStaff.length===0){c.innerHTML='<div class="empty-state"><div class="empty-icon">👥</div><p>找不到人員</p></div>';return;}
    c.innerHTML=filteredStaff.map(s=>{
        const init=(s.nickname||s.name||'?')[0],role=s.permission_level||'staff',isArchived=s.status==='封存',isActive=!isArchived&&s.status!=='inactive',sid=escAttr(s.id);
        const avatarCls=roleAvatar[role]||'staff';
        let tags='';
        (s.staff_type||'').split(',').forEach(t=>{t=t.trim();if(t)tags+='<span class="a-tag badge-staff">'+escHtml(t)+'</span>';});

/* v3 智能預設：當 HR 把「權限等級」改為 admin/manager 而組織角色仍是 staff，
   彈一個輕量提示：要不要同步把組織角色改成「部門主管」。
   super_admin 不彈（IT super_admin 不一定是組織主管）。*/
function attachOrgRoleSmartDefault(){
  const perm=document.getElementById('e_perm');
  const orgr=document.getElementById('e_orgrole');
  if(!perm||!orgr)return;
  perm.addEventListener('change',()=>{
    const p=String(perm.value||'').toLowerCase();
    const o=String(orgr.value||'').toLowerCase();
    if((p==='admin'||p==='manager')&&o==='staff'){
      if(confirm('「權限等級」設為部門主管。\n\n要同步把「組織角色」設為「部門主管」嗎？\n（這會讓 TA 出現在組織打卡圖的部門主管那一層）')){
        orgr.value='dept_head';
      }
    }
  });
}
async function generateStaffId(){
    // 2026-05-16：後端 generateStaffId 已改用 next_person_id sequence（跨 staff+coaches 共用）
    //   優先讀新欄位 nextId；舊欄位 data 為向後相容備援
    const yr=String(new Date().getFullYear()).slice(-2);
    const prefix='HD'+yr;
    const res=await callEdge('generateStaffId',{prefix});
    if(res&&res.nextId)return res.nextId;
    const data=res&&res.data;
    if(data&&data.length>0){const lastSeq=parseInt(data[0].id.slice(5))||0;return prefix+String(lastSeq+1).padStart(5,'0');}
    return prefix+'00001';
}
async function saveStaff(){
    const isCreate=!editingStaff;
    if(isCreate){
        /* === 新增模式：Supabase-first === */
        const name=val('e_name');if(!name){showToast('請輸入姓名');return;}
        try{
            showToast('⏳ 新增中...');
            const newId=await generateStaffId();
            // TODO: personalLink for user-facing schedule page needs to be implemented via Edge Function or alternative solution
            const personalLink=null;
            const newStaff={id:newId,name:name,nickname:val('e_nick')||null,staff_type:val('e_type')||null,
                gender:val('e_gender')||null,department:val('e_dept')||null,sub_department:val('e_subdept')||null,job_title:val('e_title')||null,
                permission_level:val('e_perm')||'staff',org_role:val('e_orgrole')||'staff',status:val('e_status')||'active',
                phone:val('e_phone')||null,email:val('e_email')||null,company_email:val('e_corp_email')||null,birthday:val('e_bday')||null,
                address:val('e_addr')||null,emergency_contact:val('e_ec')||null,emergency_phone:val('e_ep')||null,
                emergency_relation:val('e_er')||null,hire_date:val('e_hire')||null,leave_date:val('e_leave')||null,
                line_uid:val('e_luid')||null,line_id_edu:val('e_ledu')||null,
                remark:val('e_remark')||null,personal_link:personalLink,
                created_at:new Date().toISOString(),updated_at:new Date().toISOString()};
            const{error}=await callEdge('addStaff',{staff:newStaff}).then(()=>({error:null})).catch(e=>({error:e}));
            if(error)throw error;
            // 自動產生邀請碼
            let inviteLink='';
            try{
                const inv=await callEdge('createInviteForExisting',{table:'staff',id:newId});
                if(inv.success&&inv.invite_code){inviteLink = LIFF_PORTAL_URL + '?liff.state=' + encodeURIComponent('?invite=' + inv.invite_code);}
            }catch(e){console.warn('邀請碼產生失敗',e);}
            closeModal('editModal');
            if(inviteLink){showInviteLinkModal(name,newId,inviteLink);}
            else{showToast('✅ 已新增（編號：'+newId+'）');}
            await loadStaff();
        }catch(e){showToast('❌ 新增失敗：'+e.message);}
    }else{
        /* === 編輯模式：Supabase-first === */
        const s=editingStaff;const u={};
        function chk(field,elId,orig){const el=document.getElementById(elId);if(!el||el.readOnly)return;const v=el.value.trim();if(v!==(orig||''))u[field]=v;}
        chk('nickname','e_nick',s.nickname);chk('staff_type','e_type',s.staff_type);chk('department','e_dept',s.department);chk('sub_department','e_subdept',s.sub_department);chk('job_title','e_title',s.job_title);
        const pv=val('e_perm');if(pv!==(s.permission_level||'staff'))u.permission_level=pv;
        const orv=val('e_orgrole');if(orv!==String(s.org_role||'staff').toLowerCase())u.org_role=orv;
        const sv=val('e_status');if(sv!==(s.status||'active'))u.status=sv;
        chk('gender','e_gender',genderNorm(s.gender));chk('phone','e_phone',s.phone);chk('email','e_email',s.email);chk('company_email','e_corp_email',s.company_email);
        const bd=val('e_bday');if(bd!==(s.birthday||''))u.birthday=bd||null;
        chk('address','e_addr',s.address);chk('emergency_contact','e_ec',s.emergency_contact);chk('emergency_phone','e_ep',s.emergency_phone);
        chk('emergency_relation','e_er',s.emergency_relation);
        const hd=val('e_hire');if(hd!==(s.hire_date||''))u.hire_date=hd||null;
        const ld=val('e_leave');if(ld!==(s.leave_date||''))u.leave_date=ld||null;
        chk('remark','e_remark',s.remark);
        chk('line_uid','e_luid',s.line_uid);chk('line_id_edu','e_ledu',s.line_id_edu);
        if(Object.keys(u).length===0){showToast('沒有變更');closeModal('editModal');return;}
        try{
            showToast('⏳ 儲存中...');
            u.updated_at=new Date().toISOString();
            const{error}=await callEdge('updateStaff',{id:s.id,updates:u}).then(()=>({error:null})).catch(e=>({error:e}));
            if(error)throw error;
            showToast('✅ 已更新');closeModal('editModal');editingStaff=null;
            await loadStaff();
        }catch(e){showToast('❌ 更新失敗：'+e.message);}
    }
}

function openModal(id){document.getElementById(id).classList.add('show');}
function closeModal(id){const el=document.getElementById(id);if(el)el.classList.remove('show');}
function fg(l,t,id,v,ro){var s=ro?'readonly style="background:#f0f0f0;cursor:not-allowed;color:#888;"':'';return '<div class="form-group"><label class="form-label">'+l+(ro?' 🔒':'')+'</label><input type="'+t+'" class="form-input" id="'+id+'" value="'+escAttr(v||'')+'" '+s+'></div>';}
function fta(l,id,v,ro){if(ro)return '<div class="form-group"><label class="form-label">'+l+' 🔒</label><textarea class="form-textarea" id="'+id+'" readonly style="background:#f0f0f0;cursor:not-allowed;color:#888;">'+escHtml(v||'')+'</textarea></div>';return '<div class="form-group"><label class="form-label">'+l+'</label><textarea class="form-textarea" id="'+id+'">'+escHtml(v||'')+'</textarea></div>';}
function fsel(l,id,opts,sel,ro){if(ro){var sv=opts.find(function(o){return o[0]===sel;});return '<div class="form-group"><label class="form-label">'+l+' 🔒</label><input type="text" class="form-input" id="'+id+'" value="'+escAttr(sv?sv[1]:(sel||''))+'" readonly style="background:#f0f0f0;cursor:not-allowed;color:#888;"></div>';}return '<div class="form-group"><label class="form-label">'+l+'</label><select class="form-select" id="'+id+'">'+opts.map(function(o){return '<option value="'+o[0]+'" '+(o[0]===sel?'selected':'')+'>'+o[1]+'</option>';}).join('')+'</select></div>';}
function val(id){const e=document.getElementById(id);return e?e.value.trim():'';}
function escHtml(t){if(t==null)return'';const d=document.createElement('div');d.textContent=String(t);return d.innerHTML;}
function escAttr(t){if(t==null)return'';return String(t).replace(/&/g,'&amp;').replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(d){if(!d)return'-';try{const dt=new Date(d);return dt.getFullYear()+'/'+(dt.getMonth()+1)+'/'+dt.getDate()+' '+String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0');}catch(e){return d;}}
let toastTimer=null;function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');if(toastTimer)clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2500);}

//   ‧ 不重複顯示員工卡上已有的欄位（姓名、電話、email、生日、性別）
//   ‧ 多筆 → 全部依時間倒序顯示

async function callResumeApi(action, params){
  let _uid=null,_idToken=null;
  try{
    _uid=sessionStorage.getItem('staffLineUid');
    if(!_uid){const _st=JSON.parse(sessionStorage.getItem('currentStaff')||'null');_uid=_st?.lineUid||_st?.line_id_edu||null;}
    if(!_uid){const _u=new URLSearchParams(location.search);_uid=_u.get('line_id_edu')||_u.get('uid')||null;}
  }catch(e){}
  try{
    if(window.liff&&liff.isLoggedIn&&liff.isLoggedIn()){_idToken=liff.getIDToken();if(_idToken)sessionStorage.setItem('staffIdToken',_idToken);}
    if(!_idToken)_idToken=sessionStorage.getItem('staffIdToken');
    if(_idToken){try{const _p=JSON.parse(atob(_idToken.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));if(_p.exp&&_p.exp*1000<Date.now())_idToken=null;}catch(e){_idToken=null;}}
  }catch(e){}
  const body={action,...(params||{})};
  if(_uid&&!body.lineUid)body.lineUid=_uid;
  const headers={'Content-Type':'application/json'};
  if(_idToken)headers['X-Line-IdToken']=_idToken;
  const res=await fetch(RESUME_API_URL,{method:'POST',headers,body:JSON.stringify(body)});
  let json;try{json=await res.json();}catch(e){json={};}
  if(!res.ok||json.success===false)throw new Error(json.error||('HTTP '+res.status));
  return json;
}

async function openResumeModal(staffId){
  const s=allStaff.find(x=>x.id===staffId)||archivedStaff.find(x=>x.id===staffId);if(!s)return;
  if(!s.email&&!s.phone){showToast('此人員沒有 email 或電話，無法查履歷');return;}
  document.getElementById('resumeTitle').textContent='📄 原始履歷 — '+(s.nickname||s.name);
  document.getElementById('resumeBody').innerHTML='<div class="empty-state"><div class="empty-icon">⏳</div><p>查詢中...</p></div>';
  openModal('resumeModal');
  try{
    const r=await callResumeApi('findApplicationsByStaffContact',{email:s.email||'',phone:s.phone||''});
    const apps=Array.isArray(r.applications)?r.applications:[];
    if(apps.length===0){
      document.getElementById('resumeBody').innerHTML=
        '<div class="empty-state"><div class="empty-icon">📭</div><p>沒有找到符合的原始履歷</p>'+
        '<p style="font-size:11px;margin-top:6px;color:var(--text-muted);">配對條件：email 或 phone 任一相符</p></div>';
      return;
    }
    document.getElementById('resumeBody').innerHTML=apps.map((a,i)=>renderOneResume(a,apps.length>1?(i+1):null)).join('');
  }catch(e){
    document.getElementById('resumeBody').innerHTML=
      '<div class="empty-state"><div class="empty-icon">❌</div><p>查詢失敗</p>'+
      '<p style="font-size:12px;color:var(--text-muted);margin-top:6px;">'+escHtml(e.message||String(e))+'</p></div>';
  }
}

// 員工卡上已有 → 不重複顯示（用戶決策：完全不顯示）
const _RESUME_OMIT_COLS=new Set(['id','name','phone','email','birthday','gender','source','created_at']);

function _rd(label,value,full){
  if(value===null||value===undefined||value==='')return '';
  return '<div class="detail-field'+(full?' full':'')+'"><div class="detail-field-label">'+label+'</div><div class="detail-field-value" style="white-space:pre-wrap;word-break:break-word;">'+value+'</div></div>';
}
function _fmtSubmittedAt(iso){
  if(!iso)return '-';
  try{const d=new Date(iso);return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}catch(e){return iso;}
}
function _fmtImgList(urls){
  if(!Array.isArray(urls)||urls.length===0)return '';
  return urls.map(u=>'<a href="'+escAttr(u)+'" target="_blank" rel="noopener" style="display:inline-block;margin:2px 4px 2px 0;"><img src="'+escAttr(u)+'" style="max-width:64px;max-height:64px;border-radius:6px;border:1px solid var(--border);object-fit:cover;"></a>').join('');
}
function _fmtPdfList(urls){
  if(!Array.isArray(urls)||urls.length===0)return '';
  return urls.map((u,i)=>'<div style="margin:2px 0;"><a href="'+escAttr(u)+'" target="_blank" rel="noopener" style="color:var(--blue-dark);font-size:12px;word-break:break-all;">📎 PDF #'+(i+1)+'：'+escHtml(u)+'</a></div>').join('');
}

function renderOneResume(a,seq){
  // 顯示順序貼齊「履歷表單章節」順序：職位 → 學歷 → 天賦 → 深度問答 → 人生價值觀 → 經驗 → 學習評分 → 檔案
  let h='';
  h+='<div class="detail-section">';
  h+='<div class="detail-section-title">'+(seq?'第 '+seq+' 筆履歷　':'')+'提交資訊</div>';
  h+='<div class="detail-grid">';
  h+=_rd('提交時間',escHtml(_fmtSubmittedAt(a.submitted_at)));
  h+=_rd('來源',a.source==='backfill_sheet'?'Google Sheet 補錄':'履歷表單');
  h+='</div></div>';

  // 職位
  h+='<div class="detail-section"><div class="detail-section-title">應徵職位</div><div class="detail-grid">';
  h+=_rd('完整職位',escHtml(a.position||''),true);
  h+=_rd('部門',escHtml(a.department||''));
  h+=_rd('職位',escHtml(a.position_title||''));
  h+=_rd('專長 1',escHtml(a.specialty_1||''));
  h+=_rd('專長 2',escHtml(a.specialty_2||''));
  h+=_rd('醫學背景',escHtml(a.medical_background||''));
  h+='</div></div>';

  // 學歷（新欄位）
  if(a.highest_education){
    h+='<div class="detail-section"><div class="detail-section-title">學歷</div><div class="detail-grid">';
    h+=_rd('最高學歷',escHtml(a.highest_education));
    h+='</div></div>';
  }

  // 天賦分數
  const hasTalent=[a.talent_dynamo,a.talent_blaze,a.talent_tempo,a.talent_steel].some(v=>v!==null&&v!==undefined);
  if(hasTalent){
    h+='<div class="detail-section"><div class="detail-section-title">天賦分數</div><div class="detail-grid">';
    h+=_rd('Dynamo',escHtml(a.talent_dynamo));
    h+=_rd('Blaze',escHtml(a.talent_blaze));
    h+=_rd('Tempo',escHtml(a.talent_tempo));
    h+=_rd('Steel',escHtml(a.talent_steel));
    h+='</div></div>';
  }
  if(a.talent_chart_url){
    h+='<div class="detail-section"><div class="detail-section-title">天賦雷達圖</div>';
    h+='<a href="'+escAttr(a.talent_chart_url)+'" target="_blank" rel="noopener"><img src="'+escAttr(a.talent_chart_url)+'" style="max-width:100%;border-radius:8px;border:1px solid var(--border);"></a>';
    h+='</div>';
  }

  // 深度問答
  const hasDeep=a.work_3_years||a.leave_reason_3_years||a.longest_work_duration||a.last_job_leave_reason||a.family_interaction||a.parent_quote;
  if(hasDeep){
    h+='<div class="detail-section"><div class="detail-section-title">深度問答</div><div class="detail-grid">';
    h+=_rd('3 年以上工作',escHtml(a.work_3_years||''));
    h+=_rd('離職原因',escHtml(a.leave_reason_3_years||''),true);
    h+=_rd('最久工作年資',escHtml(a.longest_work_duration||''));
    h+=_rd('上一份離職原因',escHtml(a.last_job_leave_reason||''),true);
    h+=_rd('家庭互動',escHtml(a.family_interaction||''),true);
    h+=_rd('父母經典話',escHtml(a.parent_quote||''),true);
    h+='</div></div>';
  }

  // 人生價值觀
  const lv=[a.life_value_career,a.life_value_money,a.life_value_family,a.life_value_relationship,a.life_value_health,a.life_value_alone,a.life_value_friends];
  if(lv.some(v=>v!==null&&v!==undefined)){
    h+='<div class="detail-section"><div class="detail-section-title">人生價值觀（0-10）</div><div class="detail-grid">';
    h+=_rd('事業',escHtml(a.life_value_career));
    h+=_rd('金錢',escHtml(a.life_value_money));
    h+=_rd('家庭',escHtml(a.life_value_family));
    h+=_rd('感情',escHtml(a.life_value_relationship));
    h+=_rd('健康',escHtml(a.life_value_health));
    h+=_rd('獨處',escHtml(a.life_value_alone));
    h+=_rd('朋友',escHtml(a.life_value_friends));
    h+='</div></div>';
  }
  if(a.life_value_chart_url){
    h+='<div class="detail-section"><div class="detail-section-title">人生價值觀雷達圖</div>';
    h+='<a href="'+escAttr(a.life_value_chart_url)+'" target="_blank" rel="noopener"><img src="'+escAttr(a.life_value_chart_url)+'" style="max-width:100%;border-radius:8px;border:1px solid var(--border);"></a>';
    h+='</div>';
  }

  // 經驗與目標
  const hasExp=a.failure_experience||a.learning_initiative||a.new_skill_arrangement||a.future_goal;
  if(hasExp){
    h+='<div class="detail-section"><div class="detail-section-title">經驗與目標</div><div class="detail-grid">';
    h+=_rd('失敗經驗',escHtml(a.failure_experience||''),true);
    h+=_rd('主動學習',escHtml(a.learning_initiative||''),true);
    h+=_rd('新技能安排',escHtml(a.new_skill_arrangement||''),true);
    h+=_rd('未來目標',escHtml(a.future_goal||''),true);
    h+='</div></div>';
  }

  // 學習評分
  if(a.learning_behavior_score!=null||a.cross_skill_investment_score!=null||a.management_potential_score!=null){
    h+='<div class="detail-section"><div class="detail-section-title">隱藏評分</div><div class="detail-grid">';
    h+=_rd('學習行為',escHtml(a.learning_behavior_score));
    h+=_rd('跨技能投入',escHtml(a.cross_skill_investment_score));
    h+=_rd('管理潛力總分',escHtml(a.management_potential_score));
    h+='</div></div>';
  }

  // 檔案
  const hasFiles=(Array.isArray(a.image_urls)&&a.image_urls.length>0)||(Array.isArray(a.pdf_urls)&&a.pdf_urls.length>0);
  if(hasFiles){
    h+='<div class="detail-section"><div class="detail-section-title">附件</div>';
    if(Array.isArray(a.image_urls)&&a.image_urls.length>0){h+='<div style="margin-bottom:8px;font-size:11px;color:var(--text-muted);">圖片 ('+a.image_urls.length+')</div>'+_fmtImgList(a.image_urls);}
    if(Array.isArray(a.pdf_urls)&&a.pdf_urls.length>0){h+='<div style="margin:10px 0 4px;font-size:11px;color:var(--text-muted);">PDF ('+a.pdf_urls.length+')</div>'+_fmtPdfList(a.pdf_urls);}
    h+='</div>';
  }

  return h+(seq?'<div style="height:1px;background:var(--border);margin:12px 0 20px;"></div>':'');
}
