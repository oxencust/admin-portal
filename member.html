<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>學員管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--green:#7ac19a;--green-dark:#5a9a7a;--green-light:#e8f5ee;--pink:#f2ac98;--pink-light:#fce8e2;--pink-dark:#c67566;--blue:#9fcccc;--blue-light:#e4f2f2;--blue-dark:#6ba3a3;--yellow:#ffe08b;--card:#fff;--text:#333;--text-secondary:#666;--text-muted:#999;--border:#e5e5e5;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans TC',sans-serif;background:linear-gradient(135deg,#e2ede6 0%,#daedec 30%,#faece8 60%,#fcf4e3 100%);background-attachment:fixed;color:var(--text);min-height:100vh;}
.top-card{max-width:600px;margin:12px auto 0;padding:0 12px;}
.top-inner{background:white;border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,0.06);}
.top-main{display:flex;justify-content:space-between;align-items:flex-start;}
.top-main h1{font-size:18px;font-weight:700;color:var(--green-dark);}
.top-sub{font-size:11px;color:var(--text-muted);margin-top:2px;}
.user-badge{display:flex;align-items:center;gap:6px;background:var(--green-light);padding:4px 10px 4px 6px;border-radius:20px;}
.user-avatar{width:24px;height:24px;border-radius:50%;background:var(--green);color:white;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.user-name{font-size:12px;font-weight:600;color:var(--green-dark);}
.quick-stats{display:flex;gap:8px;margin-top:12px;}
.qs{flex:1;background:#f8faf8;border-radius:10px;padding:8px 6px;text-align:center;}
.qs-num{font-size:18px;font-weight:900;color:var(--green-dark);}
.qs-label{font-size:9px;color:var(--text-muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.action-bar{max-width:600px;margin:10px auto 0;padding:0 12px;display:flex;gap:8px;align-items:center;}
.search-input{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:12px;font-size:14px;font-family:inherit;outline:none;background:white;transition:border-color 0.2s;}
.search-input:focus{border-color:var(--green);}
.btn{padding:10px 16px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s;display:flex;align-items:center;gap:6px;white-space:nowrap;}
.btn:active{transform:scale(0.96);}
.btn-primary{background:linear-gradient(135deg,var(--green-dark),var(--green));color:white;box-shadow:0 2px 8px rgba(122,193,154,0.3);}
.btn-secondary{background:var(--blue-light);color:var(--blue-dark);}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:8px;}
.card-list{max-width:600px;margin:10px auto 0;padding:0 12px 100px;}
.a-card{background:white;border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,0.04);border-left:4px solid var(--green);transition:all 0.2s;cursor:pointer;}
.a-card:active{transform:scale(0.995);}
.a-top{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.a-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;}
.a-avatar.m{background:linear-gradient(135deg,var(--blue-light),#bbdefb);color:var(--blue-dark);}
.a-avatar.f{background:linear-gradient(135deg,var(--pink-light),#f8bbd0);color:var(--pink-dark);}
.a-info{flex:1;min-width:0;}
.a-name{font-size:16px;font-weight:700;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.a-meta{font-size:12px;color:var(--text-muted);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap;}
.a-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;}
.a-tag{padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;}
.a-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;font-size:14px;}
.a-field{display:flex;gap:4px;align-items:baseline;}
.a-field-label{color:var(--text-muted);white-space:nowrap;font-size:12px;}
.a-field-value{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.a-field.full{grid-column:1/-1;}
.a-expand{display:none;margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);}
.a-card.expanded .a-expand{display:block;}
.a-expand-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;font-size:14px;}
.a-actions{margin-top:10px;display:flex;gap:8px;justify-content:flex-end;}
.a-toggle{text-align:center;margin-top:6px;font-size:10px;color:var(--green);font-weight:600;}
.a-card.expanded .a-toggle{display:none;}
.badge{padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;}
.level-normal{background:#f5f5f5;color:#999;}.level-silver{background:#eceff1;color:#546e7a;}.level-gold{background:#fff8e1;color:#f9a825;}.level-diamond{background:#e3f2fd;color:#1565c0;}.level-vip{background:#f3e5f5;color:#8e24aa;}
.badge-pilates{background:#e8f5e9;color:#2e7d32;}.badge-weight{background:#e3f2fd;color:#1565c0;}.badge-stretch{background:#fff3e0;color:#e65100;}.badge-ai{background:#f3e5f5;color:#7b1fa2;}
.gender-m{background:var(--blue-light);color:var(--blue-dark);}.gender-f{background:var(--pink-light);color:var(--pink-dark);}
.pagination{max-width:600px;margin:0 auto;display:flex;align-items:center;justify-content:center;gap:10px;padding:12px;}
.page-select{padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;background:white;}
.page-info{font-size:12px;color:var(--text-muted);}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-bg.show{display:flex;}
.modal-panel{width:100%;max-width:500px;max-height:92vh;background:white;border-radius:20px 20px 0 0;overflow-y:auto;animation:slideUp 0.3s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:white;z-index:10;}
.modal-head h2{font-size:16px;font-weight:700;}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted);padding:4px 8px;}
.modal-body{padding:20px;padding-bottom:100px;}
.modal-footer{display:none;position:fixed;bottom:0;left:0;right:0;padding:12px 20px;background:white;border-top:1px solid var(--border);gap:10px;z-index:10;justify-content:flex-end;}
.modal-bg.show .modal-footer{display:flex;}
.form-group{margin-bottom:14px;}.form-label{font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;display:block;}
.form-input,.form-textarea,.form-select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:border-color 0.2s;}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--green);}
.form-textarea{min-height:70px;resize:vertical;}
.detail-section{margin-bottom:16px;}.detail-section-title{font-size:12px;font-weight:700;color:var(--green-dark);margin-bottom:8px;padding-bottom:6px;border-bottom:1.5px solid var(--green-light);}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}.detail-field{font-size:13px;}.detail-field.full{grid-column:1/-1;}
.detail-field-label{font-size:10px;color:var(--text-muted);margin-bottom:1px;}.detail-field-value{font-weight:500;}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);}.empty-icon{font-size:48px;margin-bottom:12px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:white;padding:10px 20px;border-radius:10px;font-size:13px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;max-width:90%;text-align:center;}.toast.show{opacity:1;}
@media(min-width:769px){.modal-bg{align-items:center;}.modal-panel{border-radius:20px;max-height:85vh;}.modal-footer{position:sticky;bottom:0;}}
</style>
</head>
<body>
<div class="top-card"><div class="top-inner">
    <div class="top-main"><div><h1>👤 學員管理</h1><div class="top-sub" id="topSub">載入中...</div></div><div class="user-badge"><div class="user-avatar" id="userAvatar">?</div><span class="user-name" id="staffName">-</span></div></div>
    <div class="quick-stats" id="quickStats"></div>
</div></div>
<div class="action-bar"><input type="text" class="search-input" id="searchInput" placeholder="🔍 搜尋姓名、編號、電話..." oninput="handleSearch()"><button class="btn btn-primary" id="addBtn" onclick="openAddModal()" style="display:none;">+ 新增</button></div>
<div class="card-list" id="studentList"><div class="empty-state"><div class="empty-icon">⏳</div><p>載入中...</p></div></div>
<div class="pagination" id="pagination" style="display:none;"><select class="page-select" id="pageSizeSelect" onchange="changePageSize()"><option value="20">20筆</option><option value="50" selected>50筆</option><option value="100">100筆</option></select><button class="btn btn-secondary btn-sm" id="prevBtn" onclick="goPage(-1)">←</button><span class="page-info" id="pageInfo">1/1</span><button class="btn btn-secondary btn-sm" id="nextBtn" onclick="goPage(1)">→</button></div>
<div class="modal-bg" id="detailModal"><div class="modal-panel"><div class="modal-head"><h2 id="detailTitle">學員資料</h2><button class="modal-close" onclick="closeModal('detailModal')">✕</button></div><div class="modal-body" id="detailBody"></div><div class="modal-footer" id="detailFooter"></div></div></div>
<div class="modal-bg" id="editModal"><div class="modal-panel"><div class="modal-head"><h2 id="editTitle">編輯學員</h2><button class="modal-close" onclick="closeModal('editModal')">✕</button></div><div class="modal-body" id="editBody"></div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('editModal')">取消</button><button class="btn btn-primary" onclick="saveStudent()">💾 儲存</button></div></div></div>
<div class="toast" id="toast"></div>
<script>
const SUPABASE_URL='https://mnjilhpztnowaplggvkk.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1uamlsaHB6dG5vd2FwbGdndmtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU3MDA0ODYsImV4cCI6MjA4MTI3NjQ4Nn0.X3e9DF3iT2KUR9ma3_Ins01vG607R155v0xia8hO_Qg';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const GAS_URL='https://script.google.com/macros/s/AKfycbwQeAQYgMVvCTWdDDst3QhuoFTBeTmnwSYMwzrTgVaPkyG-5wQSo0nWIHLk8k6Kx4DaoA/exec';
let currentUser=null,modulePerms={view:false,fill:false,edit:false,create:false,delete:false,export:false},fieldPerms={};
let students=[],totalCount=0,currentPage=1,pageSize=50,searchTerm='',searchTimeout=null,editingStudent=null;
const genderNames={'male':'男','female':'女','男':'男','女':'女','other':'其他'};
const genderKey=g=>(g==='female'||g==='女')?'f':'m';
const genderNorm=g=>({male:'male',female:'female',other:'other','男':'male','女':'female','其他':'other'}[g]||'');
const levelNames={'normal':'一般','silver':'銀卡','gold':'金卡','diamond':'鑽石','vip':'VIP'};
const levelClass={'normal':'level-normal','silver':'level-silver','gold':'level-gold','diamond':'level-diamond','vip':'level-vip'};
const expNames={'pilates':'皮拉提斯','weight':'重量訓練','stretch':'伸展課程','ai':'AI 體態分析'};

function initPermissions(){
    try{currentUser=JSON.parse(sessionStorage.getItem('currentStaff'));}catch(e){}
    if(!currentUser){const p=new URLSearchParams(window.location.search);if(p.get('uid'))currentUser={name:p.get('name')||'使用者',role:p.get('role')||'staff'};}
    if(!currentUser){document.getElementById('studentList').innerHTML='<div class="empty-state"><div class="empty-icon">🔒</div><p>請先登入</p></div>';return false;}
    document.getElementById('staffName').textContent=currentUser.name;
    document.getElementById('userAvatar').textContent=(currentUser.name||'?')[0];
    if(currentUser.role==='super_admin'||currentUser.permissions==='all'){modulePerms={view:true,fill:true,edit:true,create:true,delete:false,export:true};}
    else{modulePerms=(currentUser.permissions&&currentUser.permissions['member'])||{view:false};}
    if(currentUser.role==='super_admin'){fieldPerms={};}else{fieldPerms=(currentUser.fieldPermissions&&currentUser.fieldPermissions['member'])||{};}
    try{if(window.parent&&window.parent.getModulePermissions)modulePerms=window.parent.getModulePermissions('member');if(window.parent&&window.parent.getFieldPermissions)fieldPerms=window.parent.getFieldPermissions('member');}catch(e){}
    // 向下相容：如果 fill 未定義，從 edit 繼承
    if(modulePerms.fill===undefined)modulePerms.fill=modulePerms.edit||false;
    if(modulePerms.create)document.getElementById('addBtn').style.display='flex';
    if(!modulePerms.view){document.getElementById('studentList').innerHTML='<div class="empty-state"><div class="empty-icon">🔒</div><p>您沒有查看學員的權限</p></div>';return false;}
    return true;
}
function getFieldDisplay(f,v,mt){const p=fieldPerms[f];if(p===undefined||p===true)return escHtml(v||'-');if(p===false)return'<span style="color:#ccc;font-size:11px;">無權限</span>';if(p==='masked'){if(!v)return'-';const s=String(v);if(mt==='phone'&&s.length>=7)return escHtml(s.substring(0,4)+'***'+s.substring(s.length-3));if(mt==='email'){const a=s.indexOf('@');return a>2?escHtml(s.substring(0,2)+'***'+s.substring(a)):'***';}return escHtml(s[0]+'***'+s[s.length-1]);}return escHtml(v||'-');}
function isFieldVisible(f){const p=fieldPerms[f];return p===undefined||p===true||p==='masked';}
function isFieldFull(f){const p=fieldPerms[f];return p===undefined||p===true;}
function isMasked(f){return fieldPerms[f]==='masked';}

async function loadStudents(){
    try{
        let q=sb.from('students').select('*',{count:'exact'});
        if(searchTerm)q=q.or('name.ilike.%'+searchTerm+'%,id.ilike.%'+searchTerm+'%,phone.ilike.%'+searchTerm+'%,line_display_name.ilike.%'+searchTerm+'%');
        const from=(currentPage-1)*pageSize;
        const{data,error,count}=await q.order('id',{ascending:true}).range(from,from+pageSize-1);
        if(error)throw error;
        students=data||[];totalCount=count||0;
        document.getElementById('topSub').textContent='共 '+totalCount+' 位學員';
        renderStudents();renderPagination();
        if(!document.getElementById('quickStats').innerHTML)loadStats();
    }catch(e){console.error('Load:',e);document.getElementById('studentList').innerHTML='<div class="empty-state"><div class="empty-icon">❌</div><p>載入失敗</p></div>';}
}
async function loadStats(){
    try{
        const{data}=await sb.from('students').select('member_level,pilates_coach,weight_coach');
        if(!data)return;
        const lvl={};const coaches=new Set();
        data.forEach(s=>{lvl[s.member_level||'normal']=(lvl[s.member_level||'normal']||0)+1;if(s.pilates_coach)coaches.add(s.pilates_coach);if(s.weight_coach)coaches.add(s.weight_coach);});
        document.getElementById('quickStats').innerHTML=
            '<div class="qs"><div class="qs-num">'+data.length+'</div><div class="qs-label">總學員</div></div>'+
            '<div class="qs"><div class="qs-num">'+(lvl.gold||0)+'</div><div class="qs-label">金卡</div></div>'+
            '<div class="qs"><div class="qs-num">'+(lvl.vip||0)+'</div><div class="qs-label">VIP</div></div>'+
            '<div class="qs"><div class="qs-num">'+coaches.size+'</div><div class="qs-label">教練數</div></div>';
    }catch(e){}
}

function renderStudents(){
    const c=document.getElementById('studentList');
    if(students.length===0){c.innerHTML='<div class="empty-state"><div class="empty-icon">👤</div><p>找不到學員</p></div>';return;}
    c.innerHTML=students.map(s=>{
        const init=(s.name||'?')[0],gk=genderKey(s.gender),gd=genderNames[s.gender]||'',ld=levelNames[s.member_level]||'一般',lc=levelClass[s.member_level]||'level-normal',ed=expNames[s.first_experience]||'',sid=escAttr(s.id);
        let tags='';
        if(gd)tags+='<span class="a-tag gender-'+gk+'">'+gd+'</span>';
        if(s.pilates_coach)tags+='<span class="a-tag badge-pilates">🧘 '+escHtml(s.pilates_coach)+'</span>';
        if(s.weight_coach)tags+='<span class="a-tag badge-weight">💪 '+escHtml(s.weight_coach)+'</span>';
        if(s.stretch_course)tags+='<span class="a-tag badge-stretch">🤸 '+escHtml(s.stretch_course)+'</span>';
        let grid='';
        if(isFieldVisible('phone'))grid+=af('電話',getFieldDisplay('phone',s.phone,'phone'));
        if(s.occupation)grid+=af('職業',escHtml(s.occupation));
        if(s.join_year||s.join_month)grid+=af('加入',(s.join_year||'?')+'/'+(s.join_month||'?'));
        if(s.booking_record_30d)grid+=af('30日',escHtml(s.booking_record_30d));
        if(!s.occupation&&s.age)grid+=af('年齡',s.age+'歲');
        let exp='';
        if(isFieldVisible('email')&&s.email)exp+=af('信箱',getFieldDisplay('email',s.email,'email'));
        if(isFieldVisible('birth_date')&&s.birth_date)exp+=af('生日',escHtml(s.birth_date)+(s.age?' ('+s.age+'歲)':''));
        if(s.related_member)exp+=af('關係會員',escHtml(s.related_member));
        if(ed)exp+=af('初次體驗',ed);
        if(s.line_display_name)exp+=af('LINE',escHtml(s.line_display_name));
        if(isFieldVisible('medical_history')&&s.medical_history)exp+=aff('疾病史','<span style="color:var(--pink-dark);">'+getFieldDisplay('medical_history',s.medical_history)+'</span>');
        if(isFieldVisible('fitness_goal')&&s.fitness_goal)exp+=aff('健身目標',getFieldDisplay('fitness_goal',s.fitness_goal));
        if(s.notes)exp+=aff('備註',escHtml(s.notes));
        if(s.consultation_notes)exp+=aff('諮詢備註',escHtml(s.consultation_notes));
        if(s.ai_report)exp+=aff('AI報告',escHtml(s.ai_report));
        if(isFieldVisible('line_uid')&&s.line_uid)exp+=aff('LINE UID','<span style="font-size:10px;word-break:break-all;">'+getFieldDisplay('line_uid',s.line_uid)+'</span>');
        let acts='<button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();viewDetail(\''+sid+'\')">📋 詳細</button>';
        if(modulePerms.fill||modulePerms.edit)acts+='<button class="btn btn-primary btn-sm" onclick="event.stopPropagation();editStudent(\''+sid+'\')">✏️ 編輯</button>';
        return '<div class="a-card" id="card-'+sid+'" onclick="toggleCard(\''+sid+'\')"><div class="a-top"><div class="a-avatar '+gk+'">'+escHtml(init)+'</div><div class="a-info"><div class="a-name">'+escHtml(s.name)+' <span class="badge '+lc+'">'+ld+'</span></div><div class="a-meta"><span>'+escHtml(s.id)+'</span>'+(s.age?'<span>'+s.age+'歲</span>':'')+(ed?'<span>'+ed+'</span>':'')+(s.line_display_name?'<span>'+escHtml(s.line_display_name)+'</span>':'')+'</div></div></div>'+(tags?'<div class="a-tags">'+tags+'</div>':'')+'<div class="a-grid">'+grid+'</div><div class="a-expand"><div class="a-expand-grid">'+exp+'</div><div class="a-actions">'+acts+'</div></div><div class="a-toggle">▼ 展開更多</div></div>';
    }).join('');
}
function af(l,v){return '<div class="a-field"><span class="a-field-label">'+l+'</span><span class="a-field-value">'+v+'</span></div>';}
function aff(l,v){return '<div class="a-field full"><span class="a-field-label">'+l+'</span><span class="a-field-value" style="white-space:normal;">'+v+'</span></div>';}
function toggleCard(id){const c=document.getElementById('card-'+id);if(c)c.classList.toggle('expanded');}

function renderPagination(){const tp=Math.ceil(totalCount/pageSize)||1;document.getElementById('pagination').style.display=totalCount>0?'flex':'none';document.getElementById('pageInfo').textContent=currentPage+' / '+tp;document.getElementById('prevBtn').disabled=currentPage<=1;document.getElementById('nextBtn').disabled=currentPage>=tp;}
function handleSearch(){if(searchTimeout)clearTimeout(searchTimeout);searchTimeout=setTimeout(()=>{searchTerm=document.getElementById('searchInput').value.trim();currentPage=1;loadStudents();},300);}
function goPage(d){const tp=Math.ceil(totalCount/pageSize)||1;const np=currentPage+d;if(np<1||np>tp)return;currentPage=np;loadStudents();window.scrollTo(0,0);}
function changePageSize(){pageSize=parseInt(document.getElementById('pageSizeSelect').value)||50;currentPage=1;loadStudents();}

function viewDetail(id){
    const s=students.find(x=>x.id===id);if(!s)return;
    document.getElementById('detailTitle').textContent=s.name||'-';
    let h='<div class="detail-section"><div class="detail-section-title">基本資訊</div><div class="detail-grid">';
    h+=ddf('編號',escHtml(s.id));h+=ddf('姓名',escHtml(s.name));h+=ddf('暱稱',escHtml(s.line_display_name||'-'));h+=ddf('性別',genderNames[s.gender]||'-');
    if(s.age)h+=ddf('年齡',s.age+'歲');if(isFieldVisible('birth_date'))h+=ddf('出生日期',getFieldDisplay('birth_date',s.birth_date)+(s.age?' ('+s.age+'歲)':''));
    if(s.occupation)h+=ddf('職業',escHtml(s.occupation));h+=ddf('會員等級',levelNames[s.member_level]||'一般');h+=ddf('初次體驗',expNames[s.first_experience]||'-');
    if(s.join_year||s.join_month)h+=ddf('加入時間',(s.join_year||'?')+'年'+(s.join_month||'?')+'月');
    h+='</div></div><div class="detail-section"><div class="detail-section-title">聯絡方式</div><div class="detail-grid">';
    if(isFieldVisible('phone'))h+=ddf('電話',getFieldDisplay('phone',s.phone,'phone'));if(isFieldVisible('email'))h+=ddf('信箱',getFieldDisplay('email',s.email,'email'));
    if(s.related_member)h+=ddf('關係會員',escHtml(s.related_member));if(isFieldVisible('line_uid'))h+=ddf('LINE UID',getFieldDisplay('line_uid',s.line_uid),true);
    if(s.line_display_name)h+=ddf('LINE名稱',escHtml(s.line_display_name));
    h+='</div></div><div class="detail-section"><div class="detail-section-title">課程資訊</div><div class="detail-grid">';
    h+=ddf('🧘 皮教練',escHtml(s.pilates_coach||'-'));h+=ddf('💪 重訓教練',escHtml(s.weight_coach||'-'));h+=ddf('🤸 伸展課程',escHtml(s.stretch_course||'-'));
    if(s.booking_record_30d)h+=ddf('30日預約',escHtml(s.booking_record_30d),true);
    h+='</div></div>';
    if(isFieldVisible('medical_history')||isFieldVisible('fitness_goal')||s.ai_report){h+='<div class="detail-section"><div class="detail-section-title">健康資訊</div><div class="detail-grid">';if(isFieldVisible('medical_history'))h+=ddf('疾病史',getFieldDisplay('medical_history',s.medical_history),true);if(isFieldVisible('fitness_goal'))h+=ddf('健身目標',getFieldDisplay('fitness_goal',s.fitness_goal),true);if(s.ai_report)h+=ddf('AI報告',escHtml(s.ai_report),true);h+='</div></div>';}
    if(s.notes||s.consultation_notes){h+='<div class="detail-section"><div class="detail-section-title">備註</div><div class="detail-grid">';if(s.notes)h+=ddf('備註',escHtml(s.notes),true);if(s.consultation_notes)h+=ddf('諮詢備註',escHtml(s.consultation_notes),true);h+='</div></div>';}
    h+='<div class="detail-section"><div class="detail-section-title">系統資訊</div><div class="detail-grid">';h+=ddf('建立時間',fmtDate(s.created_at));h+=ddf('更新時間',fmtDate(s.updated_at));h+='</div></div>';
    document.getElementById('detailBody').innerHTML=h;
    let fh='';if(modulePerms.fill||modulePerms.edit)fh='<button class="btn btn-primary" onclick="closeModal(\'detailModal\');editStudent(\''+escAttr(s.id)+'\')">✏️ 編輯</button>';
    document.getElementById('detailFooter').innerHTML=fh;openModal('detailModal');
}
function ddf(l,v,full){return '<div class="detail-field'+(full?' full':'')+'"><div class="detail-field-label">'+l+'</div><div class="detail-field-value">'+(v||'-')+'</div></div>';}

function editStudent(id){
    if(!modulePerms.fill&&!modulePerms.edit){showToast('您沒有編輯權限');return;}
    const s=students.find(x=>x.id===id);if(!s)return;editingStudent=s;
    document.getElementById('editTitle').textContent='編輯：'+s.name;
    function ro(v){if(!v||v==='-')return !modulePerms.fill;return !modulePerms.edit;}
    let h='';
    h+=fg('編號','text','edit_id',s.id,true);h+=fg('姓名','text','edit_name',s.name,true);
    h+=fg('暱稱','text','edit_nickname',s.line_display_name,ro(s.line_display_name));
    h+=fsel('性別','edit_gender',[['','請選擇'],['male','男'],['female','女'],['other','其他']],genderNorm(s.gender),ro(s.gender));
    if(isFieldFull('phone'))h+=fg('電話','tel','edit_phone',s.phone,ro(s.phone));
    if(isFieldFull('email'))h+=fg('信箱','email','edit_email',s.email,ro(s.email));
    if(isFieldFull('birth_date'))h+=fg('生日','date','edit_birth',s.birth_date,ro(s.birth_date));
    if(isFieldFull('medical_history'))h+=fta('疾病史','edit_medical',s.medical_history,ro(s.medical_history));
    h+=fsel('會員等級','edit_level',[['normal','一般'],['silver','銀卡'],['gold','金卡'],['diamond','鑽石'],['vip','VIP']],s.member_level,ro(s.member_level));
    if(s.first_experience)h+=fg('初次體驗','text','_',expNames[s.first_experience]||s.first_experience,true);
    if(s.fitness_goal)h+=fg('健身目標','text','_',s.fitness_goal,true);
    if(s.line_uid)h+=fg('LINE ID','text','_',s.line_uid,true);
    document.getElementById('editBody').innerHTML=h;openModal('editModal');
}
async function saveStudent(){
    if(!editingStudent)return;
    const u={};
    const nn=val('edit_nickname');if(nn!==escAttr(editingStudent.line_display_name||''))u.line_display_name=nn;
    const gv=val('edit_gender');if(gv!==genderNorm(editingStudent.gender))u.gender=gv;
    const lv=val('edit_level');if(lv!==(editingStudent.member_level||'normal'))u.member_level=lv;
    const pe=document.getElementById('edit_phone');if(pe&&!pe.readOnly){const pv=pe.value.trim();if(pv!==(editingStudent.phone||''))u.phone=pv;}
    const ee=document.getElementById('edit_email');if(ee&&!ee.readOnly){const ev=ee.value.trim();if(ev!==(editingStudent.email||''))u.email=ev;}
    const be=document.getElementById('edit_birth');if(be&&!be.readOnly){const bv=be.value.trim();if(bv!==(editingStudent.birth_date||''))u.birth_date=bv||null;}
    const me=document.getElementById('edit_medical');if(me&&!me.readOnly){const mv=me.value.trim();if(mv!==(editingStudent.medical_history||''))u.medical_history=mv;}
    if(Object.keys(u).length===0){showToast('沒有變更');closeModal('editModal');return;}
    try{showToast('⏳ 儲存中...');const r=await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'updateStudent',id:editingStudent.id,fields:u})});const j=await r.json();if(!j.success){showToast('❌ 回寫失敗：'+(j.error||''));return;}}catch(e){showToast('❌ 回寫失敗：'+e.message);return;}
    try{u.updated_at=new Date().toISOString();const{error}=await sb.from('students').update(u).eq('id',editingStudent.id);if(error)throw error;showToast('✅ 已更新');closeModal('editModal');editingStudent=null;await loadStudents();}catch(e){showToast('⚠️ Sheet/MySQL 已更新但 Supabase 失敗');}
}
function openAddModal(){if(!modulePerms.create){showToast('您沒有新增權限');return;}editingStudent=null;document.getElementById('editTitle').textContent='新增學員';let h='';h+=fg('姓名 *','text','edit_name','');h+=fg('暱稱','text','edit_nickname','');h+=fsel('性別 *','edit_gender',[['','請選擇'],['male','男'],['female','女'],['other','其他']],'');h+=fg('電話 *','tel','edit_phone','');h+=fg('信箱','email','edit_email','');h+=fg('生日','date','edit_birth','');h+=fta('疾病史','edit_medical','');h+=fsel('會員等級','edit_level',[['normal','一般'],['silver','銀卡'],['gold','金卡'],['diamond','鑽石'],['vip','VIP']],'normal');document.getElementById('editBody').innerHTML=h;openModal('editModal');}

function openModal(id){document.getElementById(id).classList.add('show');}
function closeModal(id){const el=document.getElementById(id);if(el)el.classList.remove('show');}
function fg(l,t,id,v,ro){var s=ro?'readonly style="background:#f0f0f0;cursor:not-allowed;color:#888;"':'';return '<div class="form-group"><label class="form-label">'+l+(ro?' 🔒':'')+'</label><input type="'+t+'" class="form-input" id="'+id+'" value="'+escAttr(v||'')+'" '+s+'></div>';}
function fta(l,id,v,ro){if(ro)return '<div class="form-group"><label class="form-label">'+l+' 🔒</label><textarea class="form-textarea" id="'+id+'" readonly style="background:#f0f0f0;cursor:not-allowed;color:#888;">'+escHtml(v||'')+'</textarea></div>';return '<div class="form-group"><label class="form-label">'+l+'</label><textarea class="form-textarea" id="'+id+'">'+escHtml(v||'')+'</textarea></div>';}
function fsel(l,id,opts,sel,ro){if(ro){var sv=opts.find(function(o){return o[0]===sel;});return '<div class="form-group"><label class="form-label">'+l+' 🔒</label><input type="text" class="form-input" id="'+id+'" value="'+escAttr(sv?sv[1]:(sel||''))+'" readonly style="background:#f0f0f0;cursor:not-allowed;color:#888;"></div>';}return '<div class="form-group"><label class="form-label">'+l+'</label><select class="form-select" id="'+id+'">'+opts.map(function(o){return '<option value="'+o[0]+'" '+(o[0]===sel?'selected':'')+'>'+o[1]+'</option>';}).join('')+'</select></div>';}
function val(id){const e=document.getElementById(id);return e?e.value.trim():'';}
function escHtml(t){if(t==null)return'';const d=document.createElement('div');d.textContent=String(t);return d.innerHTML;}
function escAttr(t){if(t==null)return'';return String(t).replace(/&/g,'&amp;').replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(d){if(!d)return'-';try{const dt=new Date(d);return dt.getFullYear()+'/'+(dt.getMonth()+1)+'/'+dt.getDate()+' '+String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0');}catch(e){return d;}}
let toastTimer=null;function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');if(toastTimer)clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2500);}
document.querySelectorAll('.modal-bg').forEach(el=>{el.addEventListener('click',e=>{if(e.target===el&&el.id!=='editModal')el.classList.remove('show');});});
document.addEventListener('DOMContentLoaded',()=>{if(initPermissions())loadStudents();});
</script>
