<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>學員管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<!-- supabase-js CDN 已移除，改用 Edge Function -->
<style>
:root{--green:#7ac19a;--green-dark:#5a9a7a;--green-light:#e8f5ee;--pink:#f2ac98;--pink-light:#fce8e2;--pink-dark:#c67566;--blue:#9fcccc;--blue-light:#e4f2f2;--blue-dark:#6ba3a3;--yellow:#ffe08b;--card:#fff;--text:#333;--text-secondary:#666;--text-muted:#999;--border:#e5e5e5;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans TC',sans-serif;background:linear-gradient(135deg,#e2ede6 0%,#daedec 30%,#faece8 60%,#fcf4e3 100%);background-attachment:fixed;color:var(--text);min-height:100vh;}
.top-card{max-width:600px;margin:12px auto 0;padding:0 12px;}
.top-inner{background:white;border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,0.06);}
.top-main{display:flex;justify-content:space-between;align-items:flex-start;}
.top-main h1{font-size:18px;font-weight:700;color:var(--green-dark);}
.top-sub{font-size:11px;color:var(--text-muted);margin-top:2px;}
.user-badge{display:flex;align-items:center;gap:6px;background:var(--green-light);padding:4px 10px 4px 6px;border-radius:20px;}
.user-avatar{width:24px;height:24px;border-radius:50%;background:var(--green);color:white;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.user-name{font-size:12px;font-weight:600;color:var(--green-dark);}
.quick-stats{display:flex;gap:8px;margin-top:12px;}
.qs{flex:1;background:#f8faf8;border-radius:10px;padding:8px 6px;text-align:center;}
.qs-num{font-size:18px;font-weight:900;color:var(--green-dark);}
.qs-label{font-size:9px;color:var(--text-muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.action-bar{max-width:600px;margin:10px auto 0;padding:0 12px;display:flex;gap:8px;align-items:center;}
.search-input{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:12px;font-size:14px;font-family:inherit;outline:none;background:white;transition:border-color 0.2s;}
.search-input:focus{border-color:var(--green);}
.btn{padding:10px 16px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s;display:flex;align-items:center;gap:6px;white-space:nowrap;}
.btn:active{transform:scale(0.96);}
.btn-primary{background:linear-gradient(135deg,var(--green-dark),var(--green));color:white;box-shadow:0 2px 8px rgba(122,193,154,0.3);}
.btn-secondary{background:var(--blue-light);color:var(--blue-dark);}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:8px;}
.btn-sync{padding:7px 12px;font-size:12px;border-radius:8px;background:#f5f5f5;color:#999;border:1px solid #e5e5e5;gap:4px;position:relative;}
.btn-sync:hover{background:#e8f5e9;color:var(--green-dark);border-color:var(--green);}
.btn-sync.syncing{pointer-events:none;opacity:0.7;}
.sync-label{font-size:11px;}
.card-list{max-width:600px;margin:10px auto 0;padding:0 12px 100px;}
.a-card{background:white;border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,0.04);border-left:4px solid var(--green);transition:all 0.2s;cursor:pointer;}
.a-card:active{transform:scale(0.995);}
.a-top{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.a-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;}
.a-avatar.m{background:linear-gradient(135deg,var(--blue-light),#bbdefb);color:var(--blue-dark);}
.a-avatar.f{background:linear-gradient(135deg,var(--pink-light),#f8bbd0);color:var(--pink-dark);}
.a-info{flex:1;min-width:0;}
.a-name{font-size:16px;font-weight:700;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.a-meta{font-size:12px;color:var(--text-muted);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap;}
.a-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;}
.a-tag{padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;}
.a-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;font-size:14px;}
.a-field{display:flex;gap:4px;align-items:baseline;}
.a-field-label{color:var(--text-muted);white-space:nowrap;font-size:12px;}
.a-field-value{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.a-field.full{grid-column:1/-1;}
.a-expand{display:none;margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);}
.a-card.expanded .a-expand{display:block;}
.a-expand-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;font-size:14px;}
.a-actions{margin-top:10px;display:flex;gap:8px;justify-content:flex-end;}
.a-toggle{text-align:center;margin-top:6px;font-size:10px;color:var(--green);font-weight:600;}
.a-card.expanded .a-toggle{display:none;}
.badge{padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;}
.level-normal{background:#f5f5f5;color:#999;}.level-silver{background:#eceff1;color:#546e7a;}.level-gold{background:#fff8e1;color:#f9a825;}.level-diamond{background:#e3f2fd;color:#1565c0;}.level-vip{background:#f3e5f5;color:#8e24aa;}
.badge-pilates{background:#e8f5e9;color:#2e7d32;}.badge-weight{background:#e3f2fd;color:#1565c0;}.badge-stretch{background:#fff3e0;color:#e65100;}.badge-ai{background:#f3e5f5;color:#7b1fa2;}
.gender-m{background:var(--blue-light);color:var(--blue-dark);}.gender-f{background:var(--pink-light);color:var(--pink-dark);}
.pagination{max-width:600px;margin:0 auto;display:flex;align-items:center;justify-content:center;gap:10px;padding:12px;}
.page-select{padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;background:white;}
.page-info{font-size:12px;color:var(--text-muted);}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-bg.show{display:flex;}
.modal-panel{width:100%;max-width:500px;max-height:92vh;background:white;border-radius:20px 20px 0 0;overflow-y:auto;animation:slideUp 0.3s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:white;z-index:10;}
.modal-head h2{font-size:16px;font-weight:700;}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted);padding:4px 8px;}
.modal-body{padding:20px;padding-bottom:100px;}
.modal-footer{display:none;position:fixed;bottom:0;left:0;right:0;padding:12px 20px;background:white;border-top:1px solid var(--border);gap:10px;z-index:10;justify-content:flex-end;}
.modal-bg.show .modal-footer{display:flex;}
.form-group{margin-bottom:14px;}.form-label{font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;display:block;}
.form-input,.form-textarea,.form-select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:border-color 0.2s;}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--green);}
.form-textarea{min-height:70px;resize:vertical;}
.detail-section{margin-bottom:16px;}.detail-section-title{font-size:12px;font-weight:700;color:var(--green-dark);margin-bottom:8px;padding-bottom:6px;border-bottom:1.5px solid var(--green-light);}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}.detail-field{font-size:13px;}.detail-field.full{grid-column:1/-1;}
.detail-field-label{font-size:10px;color:var(--text-muted);margin-bottom:1px;}.detail-field-value{font-weight:500;}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);}.empty-icon{font-size:48px;margin-bottom:12px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:white;padding:10px 20px;border-radius:10px;font-size:13px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;max-width:90%;text-align:center;}.toast.show{opacity:1;}
@media(min-width:769px){.modal-bg{align-items:center;}.modal-panel{border-radius:20px;max-height:85vh;}.modal-footer{position:sticky;bottom:0;}}
/* MOTI/InBody 按鈕 */
.record-btns{display:flex;gap:8px;margin:10px 0 6px;flex-wrap:wrap;}
.record-btn{flex:1;min-width:0;padding:10px 8px;border:1.5px solid var(--border);border-radius:10px;background:white;font-size:12px;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.2s;}
.record-btn:active{transform:scale(0.97);}
.record-btn.moti{border-color:#A78BCA;color:#7B5EA7;}.record-btn.moti:hover{background:#F3E8FF;}
.record-btn.inbody{border-color:#5DCAA5;color:#0F6E56;}.record-btn.inbody:hover{background:#E1F5EE;}
.record-btn .r-icon{font-size:16px;flex-shrink:0;}
.record-btn .r-info{flex:1;min-width:0;text-align:left;}
.record-btn .r-label{font-weight:600;font-size:12px;}
.record-btn .r-hint{font-size:10px;color:var(--text-muted);margin-top:1px;}
.record-btn .r-arrow{color:var(--text-muted);font-size:11px;flex-shrink:0;}
/* 紀錄 Modal */
.record-timeline{display:flex;flex-direction:column;gap:10px;}
.record-item{background:#f8faf8;border-radius:12px;padding:14px;border-left:4px solid #A78BCA;cursor:pointer;transition:all 0.2s;}
.record-item:active{transform:scale(0.99);}
.record-item.inbody-item{border-left-color:#5DCAA5;}
.record-item-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.record-item-date{font-size:14px;font-weight:600;}
.record-item-badge{font-size:11px;padding:2px 8px;border-radius:8px;background:rgba(167,139,202,0.15);color:#7B5EA7;}
.record-item.inbody-item .record-item-badge{background:rgba(93,202,165,0.15);color:#0F6E56;}
.record-item-summary{font-size:12px;color:var(--text-secondary);line-height:1.5;}
.record-item-images{display:flex;gap:6px;margin-top:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.record-item-images img{width:60px;height:60px;border-radius:8px;object-fit:cover;border:1px solid var(--border);flex-shrink:0;cursor:pointer;}
/* 紀錄詳情 */
.record-detail{padding:0;}
.rd-section{margin-bottom:16px;}
.rd-section-title{font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.rd-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.rd-field{font-size:12px;}.rd-field.full{grid-column:1/-1;}
.rd-field-label{color:var(--text-muted);font-size:10px;}.rd-field-value{font-weight:500;margin-top:1px;}
.rd-risk{display:flex;gap:6px;margin-bottom:4px;}
.rd-risk-tag{padding:4px 10px;border-radius:8px;font-size:12px;font-weight:500;}
.rd-risk-tag:nth-child(1){background:#fce8e2;color:#c67566;}
.rd-risk-tag:nth-child(2){background:#fcf4e3;color:#ba9e60;}
.rd-risk-tag:nth-child(3){background:#e4f2f2;color:#6ba3a3;}
.rd-gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px;}
.rd-gallery img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;border:1px solid var(--border);cursor:pointer;}
.rd-gallery img:active{opacity:0.7;}
/* InBody 數據卡 */
.inbody-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.ib-card{background:white;border-radius:10px;padding:10px;text-align:center;border:1px solid var(--border);}
.ib-card-value{font-size:18px;font-weight:700;color:#0F6E56;}
.ib-card-label{font-size:10px;color:var(--text-muted);margin-top:2px;}
.ib-card-unit{font-size:10px;color:var(--text-muted);}
/* 圖片燈箱 */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:999;display:none;align-items:center;justify-content:center;cursor:pointer;}
.lightbox.show{display:flex;}
.lightbox img{max-width:95%;max-height:90vh;object-fit:contain;border-radius:8px;}
</style>
</head>
<body>
<div class="top-card"><div class="top-inner">
    <div class="top-main"><div><h1>👤 學員管理</h1><div class="top-sub" id="topSub">載入中...</div></div><div class="user-badge"><div class="user-avatar" id="userAvatar">?</div><span class="user-name" id="staffName">-</span></div></div>
    <div class="quick-stats" id="quickStats"></div>
</div></div>
<div class="action-bar"><input type="text" class="search-input" id="searchInput" placeholder="🔍 搜尋姓名、編號、電話..." oninput="handleSearch()"><button class="btn btn-sync" id="syncBtn" onclick="manualSync()" title="即時同步">🔄<span class="sync-label">同步</span></button><button class="btn btn-primary" id="addBtn" onclick="openAddModal()" style="display:none;">+ 新增</button></div>
<div class="card-list" id="studentList"><div class="empty-state"><div class="empty-icon">⏳</div><p>載入中...</p></div></div>
<div class="pagination" id="pagination" style="display:none;"><select class="page-select" id="pageSizeSelect" onchange="changePageSize()"><option value="20">20筆</option><option value="50" selected>50筆</option><option value="100">100筆</option></select><button class="btn btn-secondary btn-sm" id="prevBtn" onclick="goPage(-1)">←</button><span class="page-info" id="pageInfo">1/1</span><button class="btn btn-secondary btn-sm" id="nextBtn" onclick="goPage(1)">→</button></div>
<div class="modal-bg" id="detailModal"><div class="modal-panel"><div class="modal-head"><h2 id="detailTitle">學員資料</h2><button class="modal-close" onclick="closeModal('detailModal')">✕</button></div><div class="modal-body" id="detailBody"></div><div class="modal-footer" id="detailFooter"></div></div></div>
<div class="modal-bg" id="editModal"><div class="modal-panel"><div class="modal-head"><h2 id="editTitle">編輯學員</h2><button class="modal-close" onclick="closeModal('editModal')">✕</button></div><div class="modal-body" id="editBody"></div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('editModal')">取消</button><button class="btn btn-primary" onclick="saveStudent()">💾 儲存</button></div></div></div>
<div class="modal-bg" id="recordModal"><div class="modal-panel"><div class="modal-head"><h2 id="recordTitle">檢測紀錄</h2><button class="modal-close" onclick="closeModal('recordModal')">✕</button></div><div class="modal-body" id="recordBody"><div style="text-align:center;padding:40px;color:var(--text-muted);">載入中...</div></div><div class="modal-footer" id="recordFooter"></div></div></div>
<div class="modal-bg" id="recordDetailModal"><div class="modal-panel"><div class="modal-head"><h2 id="recordDetailTitle">紀錄詳情</h2><button class="modal-close" onclick="closeModal('recordDetailModal')">✕</button></div><div class="modal-body" id="recordDetailBody"></div><div class="modal-footer"></div></div></div>
<div class="lightbox" id="lightbox" onclick="closeLightbox()"><img id="lightboxImg" src="" alt=""></div>
<div class="toast" id="toast"></div>
<script>
const EDGE_FUNCTION_URL='https://mnjilhpztnowaplggvkk.supabase.co/functions/v1/admin-api';
async function callEdge(action,params={}){const res=await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,...params})});const json=await res.json().catch(()=>({}));if(!res.ok)throw new Error(json.error||json.message||'Edge Function error: '+res.status);return json;}
let currentUser=null,modulePerms={view:false,fill:false,edit:false,create:false,delete:false,export:false},fieldPerms={};
let students=[],totalCount=0,currentPage=1,pageSize=50,searchTerm='',searchTimeout=null,editingStudent=null;
const genderNames={'male':'男','female':'女','男':'男','女':'女','other':'其他'};
const genderKey=g=>(g==='female'||g==='女')?'f':'m';
const genderNorm=g=>({male:'male',female:'female',other:'other','男':'male','女':'female','其他':'other'}[g]||'');
const levelNames={'normal':'一般','silver':'銀卡','gold':'金卡','diamond':'鑽石','vip':'VIP'};
const levelClass={'normal':'level-normal','silver':'level-silver','gold':'level-gold','diamond':'level-diamond','vip':'level-vip'};
const expNames={'pilates':'皮拉提斯','weight':'重量訓練','stretch':'伸展課程','ai':'AI 體態分析'};

function initPermissions(){
    try{currentUser=JSON.parse(sessionStorage.getItem('currentStaff'));}catch(e){}
    if(!currentUser){const p=new URLSearchParams(window.location.search);if(p.get('uid'))currentUser={name:p.get('name')||'使用者',role:p.get('permission_level')||p.get('role')||'employee'};}
    if(!currentUser){document.getElementById('studentList').innerHTML='<div class="empty-state"><div class="empty-icon">🔒</div><p>請先登入</p></div>';return false;}
    document.getElementById('staffName').textContent=currentUser.name;
    document.getElementById('userAvatar').textContent=(currentUser.name||'?')[0];
    if(currentUser.role==='super_admin'||currentUser.permissions==='all'){modulePerms={view:true,fill:true,edit:true,create:true,delete:false,export:true};}
    else{modulePerms=(currentUser.permissions&&currentUser.permissions['member'])||{view:false};}
    if(currentUser.role==='super_admin'){fieldPerms={};}else{fieldPerms=(currentUser.fieldPermissions&&currentUser.fieldPermissions['member'])||{};}
    try{if(window.parent&&window.parent.getModulePermissions)modulePerms=window.parent.getModulePermissions('member');if(window.parent&&window.parent.getFieldPermissions)fieldPerms=window.parent.getFieldPermissions('member');}catch(e){}
    // 向下相容：如果 fill 未定義，從 edit 繼承
    if(modulePerms.fill===undefined)modulePerms.fill=modulePerms.edit||false;
    if(modulePerms.create)document.getElementById('addBtn').style.display='flex';
    if(!modulePerms.view){document.getElementById('studentList').innerHTML='<div class="empty-state"><div class="empty-icon">🔒</div><p>您沒有查看學員的權限</p></div>';return false;}
    return true;
}
function formatPhone(v){if(!v)return'';var s=String(v).trim();if(s.startsWith('+886'))s='0'+s.substring(4);if(s.startsWith('886')&&s.length>=11)s='0'+s.substring(3);return s;}
function getFieldDisplay(f,v,mt){if(mt==='phone')v=formatPhone(v);const p=fieldPerms[f];if(p===undefined||p===true)return escHtml(v||'-');if(p===false)return'<span style="color:#ccc;font-size:11px;">無權限</span>';if(p==='masked'){if(!v)return'-';const s=String(v);if(mt==='phone'&&s.length>=7)return escHtml(s.substring(0,4)+'***'+s.substring(s.length-3));if(mt==='email'){const a=s.indexOf('@');return a>2?escHtml(s.substring(0,2)+'***'+s.substring(a)):'***';}return escHtml(s[0]+'***'+s[s.length-1]);}return escHtml(v||'-');}
function isFieldVisible(f){const p=fieldPerms[f];return p===undefined||p===true||p==='masked';}
function isFieldFull(f){const p=fieldPerms[f];return p===undefined||p===true;}
function isMasked(f){return fieldPerms[f]==='masked';}

async function loadStudents(){
    try{
        const from=(currentPage-1)*pageSize;
        const{data,count}=await callEdge('getStudents',{searchTerm,page:currentPage,pageSize});
        students=data||[];totalCount=count||0;
        document.getElementById('topSub').textContent='共 '+totalCount+' 位學員';
        renderStudents();renderPagination();
        if(!document.getElementById('quickStats').innerHTML)loadStats();
    }catch(e){console.error('Load:',e);document.getElementById('studentList').innerHTML='<div class="empty-state"><div class="empty-icon">❌</div><p>載入失敗</p></div>';}
}
async function loadStats(){
    try{
        const{data,count}=await callEdge('getStudentStats');
        if(!data)return;
        const lvl={};const coaches=new Set();
        data.forEach(s=>{lvl[s.member_level||'normal']=(lvl[s.member_level||'normal']||0)+1;if(s.pilates_coach)coaches.add(s.pilates_coach);if(s.weight_coach)coaches.add(s.weight_coach);});
        document.getElementById('quickStats').innerHTML=
            '<div class="qs"><div class="qs-num">'+(count||data.length)+'</div><div class="qs-label">總學員</div></div>'+
            '<div class="qs"><div class="qs-num">'+(lvl.gold||0)+'</div><div class="qs-label">金卡</div></div>'+
            '<div class="qs"><div class="qs-num">'+(lvl.vip||0)+'</div><div class="qs-label">VIP</div></div>'+
            '<div class="qs"><div class="qs-num">'+coaches.size+'</div><div class="qs-label">教練數</div></div>';
    }catch(e){}
}

function renderStudents(){
    const c=document.getElementById('studentList');
    if(students.length===0){c.innerHTML='<div class="empty-state"><div class="empty-icon">👤</div><p>找不到學員</p></div>';return;}
    c.innerHTML=students.map(s=>{
        const init=(s.name||'?')[0],gk=genderKey(s.gender),gd=genderNames[s.gender]||'',ld=levelNames[s.member_level]||'一般',lc=levelClass[s.member_level]||'level-normal',ed=expNames[s.first_experience]||'',sid=escAttr(s.id);
        let tags='';
        if(gd)tags+='<span class="a-tag gender-'+gk+'">'+gd+'</span>';

async function saveStudent(){
    // ===== 新增模式（Supabase-first + GAS callback）=====
    if(!editingStudent){
        const name=val('edit_name');
        const gender=val('edit_gender');
        const phone=val('edit_phone');
        if(!name){showToast('請填寫姓名');return;}
        if(!gender){showToast('請選擇性別');return;}
        if(!phone){showToast('請填寫電話');return;}

        const genderZh = {'male':'男','female':'女','other':'其他'}[gender] || gender;
        const nickname = val('edit_nickname');
        const email = val('edit_email');
        const birthDate = val('edit_birth') || null;
        const medicalHistory = val('edit_medical');
        const memberLevel = val('edit_level') || 'normal';

        try{
            showToast('⏳ 新增中...請稍候',0);

            // ── 1. 從 Edge Function 產生下一個 ID（依選擇的加入年份）──
            const joinYear = val('edit_join_year') || String(new Date().getFullYear());
            const yearPrefix = 'HDS' + joinYear.substring(2);
            const{data:idData}=await callEdge('generateMemberId',{prefix:yearPrefix});
            const newId=idData.member_id;

            // ── 2. 主寫入：Edge Function（含 GAS 回寫 Google Sheet）──
            const student={id:newId,name:name,line_display_name:nickname||'',gender:genderZh,birth_date:birthDate,phone:phone,email:email||'',medical_history:medicalHistory||'',member_level:memberLevel,updated_at:new Date().toISOString()};
            const result=await callEdge('addStudent',{student});
            if(result.error){showToast('❌ 新增失敗：'+result.error);return;}

            // 顯示 GAS 診斷結果（除錯用，之後可移除）
            console.log('GAS debug:', result.gasDebug);
            const gasInfo = result.gasDebug ? '\n[GAS: '+result.gasDebug+']' : '';
            showToast('✅ 已新增：' + newId + gasInfo, 5000);
            closeModal('editModal');
            await loadStudents();
        }catch(e){showToast('❌ 新增失敗：'+e.message);}
        return;
    }
    // ===== 編輯模式（以下不動）=====
    const u={};
    const nn=val('edit_nickname');if(nn!==escAttr(editingStudent.line_display_name||''))u.line_display_name=nn;
    const gv=val('edit_gender');if(gv!==genderNorm(editingStudent.gender))u.gender=gv;
    const lv=val('edit_level');if(lv!==(editingStudent.member_level||'normal'))u.member_level=lv;
    const pe=document.getElementById('edit_phone');if(pe&&!pe.readOnly){const pv=pe.value.trim();if(pv!==formatPhone(editingStudent.phone||''))u.phone=pv;}
    const ee=document.getElementById('edit_email');if(ee&&!ee.readOnly){const ev=ee.value.trim();if(ev!==(editingStudent.email||''))u.email=ev;}
    const be=document.getElementById('edit_birth');if(be&&!be.readOnly){const bv=be.value.trim();if(bv!==(editingStudent.birth_date||''))u.birth_date=bv||null;}
    const me=document.getElementById('edit_medical');if(me&&!me.readOnly){const mv=me.value.trim();if(mv!==(editingStudent.medical_history||''))u.medical_history=mv;}
      if(Object.keys(u).length===0){showToast('沒有變更');closeModal('editModal');return;}

    // ── 1. 主寫入：Edge Function ──
    try {
        showToast('⏳ 儲存中...請稍候',0);
        u.updated_at = new Date().toISOString();
        const { error } = await callEdge('updateStudent', {id: editingStudent.id, updates: u});
        if (error) { showToast('❌ 儲存失敗：' + error); return; }
    } catch(e) { showToast('❌ 儲存失敗：' + e.message); return; }

    // ── 3. 更新前端 ──
    showToast('✅ 已更新');
    closeModal('editModal');
    editingStudent = null;
    await loadStudents();
}

async function openMotiHistory(memberId, memberName) {
    document.getElementById('recordTitle').textContent = '📊 ' + memberName + ' MOTI 紀錄';
    document.getElementById('recordBody').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);">載入中...</div>';
    openModal('recordModal');
    try {
        const result = await callEdge('getAssessmentHistory', {memberId});
        const data = result?.data || result;
        if (!data || data.length === 0) {
            document.getElementById('recordBody').innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text-muted);"><div style="font-size:48px;margin-bottom:12px;">📊</div><p>尚無 MOTI 檢測紀錄</p></div>';
            return;
        }
        document.getElementById('recordBody').innerHTML = '<div class="record-timeline">' + data.map(function(r, i) {
            var date = r.assessment_date || '-';
            var risks = [r.risk_1, r.risk_2, r.risk_3].filter(Boolean);
            var summary = risks.length > 0 ? '風險：' + risks.join('、') : '';
            if (r.total_courses) summary += (summary ? ' · ' : '') + '建議 ' + r.total_courses + ' 堂';
            var imgs = '';
            if (r.moti_images) {
                var urls = r.moti_images.split(',').map(function(u){return u.trim();}).filter(Boolean).slice(0, 4);
                if (urls.length > 0) imgs = '<div class="record-item-images">' + urls.map(function(u){return '<img src="'+escAttr(u)+'" onclick="event.stopPropagation();openLightbox(\''+escAttr(u)+'\')" loading="lazy">';}).join('') + '</div>';
            }
            return '<div class="record-item" onclick="viewMotiDetail('+r.mysql_id+')"><div class="record-item-head"><span class="record-item-date">' + date + '</span><span class="record-item-badge">第 ' + (data.length - i) + ' 次</span></div>' + (summary ? '<div class="record-item-summary">' + escHtml(summary) + '</div>' : '') + imgs + '</div>';
        }).join('') + '</div>';
        window._motiCache = {};
        data.forEach(function(r) { window._motiCache[r.mysql_id] = r; });
    } catch(e) {
        document.getElementById('recordBody').innerHTML = '<div style="text-align:center;padding:40px;color:#e05252;">載入失敗：' + escHtml(e.message) + '</div>';
    }
}

    var r = window._motiCache && window._motiCache[mysqlId];
    if (!r) return;
    document.getElementById('recordDetailTitle').textContent = '📊 MOTI 檢測 ' + (r.assessment_date || '');
    var h = '<div class="record-detail">';
    // 風險排名

        if (r.short_term_goal) h += '<div class="rd-field full"><div class="rd-field-label">短期目標</div><div class="rd-field-value">' + escHtml(r.short_term_goal) + '</div></div>';

        h += '</div></div>';
    }
    // 功能訓練 / 筋膜放鬆 / 注意事項
    var extras = [];
    if (r.functional_training) extras.push({l:'建議功能訓練',v:r.functional_training});
    if (r.fascia_release) extras.push({l:'建議筋膜放鬆',v:r.fascia_release});
    if (r.precautions) extras.push({l:'注意事項',v:r.precautions});
    if (r.service_notes) extras.push({l:'客服協助',v:r.service_notes});
    if (r.notes) extras.push({l:'備註',v:r.notes});
    if (extras.length > 0) {
        h += '<div class="rd-section"><div class="rd-section-title">📝 詳細說明</div><div class="rd-grid">';
        extras.forEach(function(ex) { h += '<div class="rd-field full"><div class="rd-field-label">' + ex.l + '</div><div class="rd-field-value">' + escHtml(ex.v) + '</div></div>'; });
        h += '</div></div>';
    }
    // MOTI 圖片
    if (r.moti_images) {
        var urls = r.moti_images.split(',').map(function(u){return u.trim();}).filter(Boolean);
        if (urls.length > 0) {
            h += '<div class="rd-section"><div class="rd-section-title">📸 MOTI 體態照片</div>';
            h += '<div class="rd-gallery">' + urls.map(function(u){return '<img src="'+escAttr(u)+'" onclick="openLightbox(\''+escAttr(u)+'\')" loading="lazy">';}).join('') + '</div>';
            h += '</div>';
        }
    }
    // InBody 圖片
    if (r.inbody_images) {
        var iUrls = r.inbody_images.split(',').map(function(u){return u.trim();}).filter(Boolean);
        if (iUrls.length > 0) {
            h += '<div class="rd-section"><div class="rd-section-title">📋 InBody 報告</div>';
            h += '<div class="rd-gallery">' + iUrls.map(function(u){return '<img src="'+escAttr(u)+'" onclick="openLightbox(\''+escAttr(u)+'\')" loading="lazy">';}).join('') + '</div>';
            h += '</div>';
        }
    }
    // 資料夾連結
    if (r.moti_folder) {
        h += '<div class="rd-section"><div style="text-align:center;"><a href="' + escAttr(r.moti_folder) + '" target="_blank" style="display:inline-block;padding:10px 20px;background:#A78BCA;color:white;border-radius:10px;text-decoration:none;font-size:13px;font-weight:600;">📁 開啟完整相簿</a></div></div>';
    }
    h += '</div>';
    document.getElementById('recordDetailBody').innerHTML = h;
    openModal('recordDetailModal');
}

async function openInbodyHistory(memberId, memberName) {
    document.getElementById('recordTitle').textContent = '🏋️ ' + memberName + ' InBody 紀錄';
    document.getElementById('recordBody').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);">載入中...</div>';
    openModal('recordModal');
    try {
        // 查 InBody 數據 + MOTI 的 InBody 圖片
        const {data,motiData}=await callEdge('getInbodyHistory',{memberId});
        
        // 建立日期→圖片對照表
        var imgByDate = {};
        motiData.forEach(function(m) {
            if (m.inbody_images && m.assessment_date) {
                imgByDate[m.assessment_date] = m.inbody_images;
            }
        });
        
        if (data.length === 0 && motiData.filter(m => m.inbody_images).length === 0) {
            document.getElementById('recordBody').innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text-muted);"><div style="font-size:48px;margin-bottom:12px;">🏋️</div><p>尚無 InBody 紀錄</p></div>';
            return;
        }
        // 如果 inbody_records 沒資料但 MOTI 有 InBody 照片，用 MOTI 資料生成列表
        if (data.length === 0) {
            var motiWithImg = motiData.filter(function(m) { return m.inbody_images; });
            document.getElementById('recordBody').innerHTML = '<div class="record-timeline">' + motiWithImg.map(function(m, i) {
                var date = m.assessment_date || '-';
                var imgs = '';
                var urls = m.inbody_images.split(',').map(function(u){return u.trim();}).filter(Boolean);
                if (urls.length > 0) imgs = '<div class="record-item-images">' + urls.map(function(u){return '<img src="'+escAttr(u)+'" onclick="event.stopPropagation();openLightbox(\''+escAttr(u)+'\')" loading="lazy">';}).join('') + '</div>';
                return '<div class="record-item inbody-item"><div class="record-item-head"><span class="record-item-date">' + date + '</span><span class="record-item-badge">第 ' + (motiWithImg.length - i) + ' 次</span></div><div class="record-item-summary">InBody 報告照片</div>' + imgs + '</div>';
            }).join('') + '</div>';
            return;
        }
        document.getElementById('recordBody').innerHTML = '<div class="record-timeline">' + data.map(function(r, i) {
            var date = r.test_date || '-';
            var parts = [];
            if (r.body_weight) parts.push('體重 ' + r.body_weight + 'kg');
            if (r.body_fat_percent) parts.push('體脂 ' + r.body_fat_percent + '%');
            if (r.skeletal_muscle) parts.push('肌肉 ' + r.skeletal_muscle + 'kg');
            if (r.bmi) parts.push('BMI ' + r.bmi);
            var summary = parts.join(' · ');
            // 跟上一次比較
            var diff = '';
            if (i < data.length - 1) {
                var prev = data[i + 1];
                var diffs = [];
                if (r.body_weight && prev.body_weight) { var d = (r.body_weight - prev.body_weight).toFixed(1); if (d != 0) diffs.push('體重 ' + (d > 0 ? '+' : '') + d); }
                if (r.body_fat_percent && prev.body_fat_percent) { var d = (r.body_fat_percent - prev.body_fat_percent).toFixed(1); if (d != 0) diffs.push('體脂 ' + (d > 0 ? '+' : '') + d + '%'); }
                if (r.skeletal_muscle && prev.skeletal_muscle) { var d = (r.skeletal_muscle - prev.skeletal_muscle).toFixed(1); if (d != 0) diffs.push('肌肉 ' + (d > 0 ? '+' : '') + d); }
                if (diffs.length > 0) diff = '<div style="font-size:11px;color:#0F6E56;margin-top:4px;">📈 vs 上次：' + diffs.join('、') + '</div>';
            }
            // InBody 圖片（從 MOTI 表帶入）
            var imgs = '';
            var inbodyImgStr = r.image_url || imgByDate[date] || '';
            if (inbodyImgStr) {
                var urls = inbodyImgStr.split(',').map(function(u){return u.trim();}).filter(Boolean).slice(0, 3);
                if (urls.length > 0) imgs = '<div class="record-item-images">' + urls.map(function(u){return '<img src="'+escAttr(u)+'" onclick="event.stopPropagation();openLightbox(\''+escAttr(u)+'\')" loading="lazy">';}).join('') + '</div>';
            }
            return '<div class="record-item inbody-item" onclick="viewInbodyDetail('+r.mysql_id+')"><div class="record-item-head"><span class="record-item-date">' + date + '</span><span class="record-item-badge">第 ' + (data.length - i) + ' 次</span></div><div class="record-item-summary">' + escHtml(summary) + '</div>' + diff + imgs + '</div>';
        }).join('') + '</div>';
        window._inbodyCache = {};
        window._inbodyImgByDate = imgByDate;
        data.forEach(function(r) { window._inbodyCache[r.mysql_id] = r; });
    } catch(e) {
        document.getElementById('recordBody').innerHTML = '<div style="text-align:center;padding:40px;color:#e05252;">載入失敗：' + escHtml(e.message) + '</div>';
    }
}

function viewInbodyDetail(mysqlId) {
    var r = window._inbodyCache && window._inbodyCache[mysqlId];
    if (!r) return;
    document.getElementById('recordDetailTitle').textContent = '🏋️ InBody ' + (r.test_date || '');
    var h = '<div class="record-detail">';
    // 主要數據卡
    h += '<div class="rd-section"><div class="rd-section-title">📊 主要數據</div><div class="inbody-cards">';
    if (r.body_weight != null) h += '<div class="ib-card"><div class="ib-card-value">' + r.body_weight + '</div><div class="ib-card-label">體重</div><div class="ib-card-unit">kg</div></div>';
    if (r.skeletal_muscle != null) h += '<div class="ib-card"><div class="ib-card-value">' + r.skeletal_muscle + '</div><div class="ib-card-label">骨骼肌重</div><div class="ib-card-unit">kg</div></div>';
    if (r.body_fat_mass != null) h += '<div class="ib-card"><div class="ib-card-value">' + r.body_fat_mass + '</div><div class="ib-card-label">體脂肪重</div><div class="ib-card-unit">kg</div></div>';
    if (r.bmi != null) h += '<div class="ib-card"><div class="ib-card-value">' + r.bmi + '</div><div class="ib-card-label">BMI</div><div class="ib-card-unit">kg/m²</div></div>';
    if (r.body_fat_percent != null) h += '<div class="ib-card"><div class="ib-card-value">' + r.body_fat_percent + '</div><div class="ib-card-label">體脂率</div><div class="ib-card-unit">%</div></div>';
    if (r.basal_metabolic_rate != null) h += '<div class="ib-card"><div class="ib-card-value">' + r.basal_metabolic_rate + '</div><div class="ib-card-label">基礎代謝</div><div class="ib-card-unit">kcal</div></div>';
    h += '</div></div>';
    // 身體組成
    var composition = [];
    if (r.total_body_water != null) composition.push({l:'身體水分',v:r.total_body_water+' L'});
    if (r.protein != null) composition.push({l:'蛋白質',v:r.protein+' kg'});
    if (r.minerals != null) composition.push({l:'礦物質',v:r.minerals+' kg'});
    if (r.visceral_fat != null) composition.push({l:'內臟脂肪',v:'Level '+r.visceral_fat});
    if (composition.length > 0) {
        h += '<div class="rd-section"><div class="rd-section-title">🧬 身體組成</div><div class="rd-grid">';
        composition.forEach(function(c) { h += '<div class="rd-field"><div class="rd-field-label">' + c.l + '</div><div class="rd-field-value">' + c.v + '</div></div>'; });
        h += '</div></div>';
    }
    // 圖片（優先用 inbody_records 自己的，沒有就從 MOTI 帶入）
    var imgStr = r.image_url || (window._inbodyImgByDate && window._inbodyImgByDate[r.test_date]) || '';
    if (imgStr) {
        var imgUrls = imgStr.split(',').map(function(u){return u.trim();}).filter(Boolean);
        if (imgUrls.length > 0) {
            h += '<div class="rd-section"><div class="rd-section-title">📋 InBody 報告圖片</div>';
            h += '<div class="rd-gallery">' + imgUrls.map(function(u){return '<img src="'+escAttr(u)+'" onclick="openLightbox(\''+escAttr(u)+'\')" loading="lazy">';}).join('') + '</div>';
            h += '</div>';
        }
    }
    if (r.notes) {
        h += '<div class="rd-section"><div class="rd-section-title">📝 備註</div><div style="font-size:13px;color:var(--text-secondary);">' + escHtml(r.notes) + '</div></div>';
    }
    h += '</div>';
    document.getElementById('recordDetailBody').innerHTML = h;
    openModal('recordDetailModal');
}

function openLightbox(url) { document.getElementById('lightboxImg').src = url; document.getElementById('lightbox').classList.add('show'); }
function closeLightbox() { document.getElementById('lightbox').classList.remove('show'); document.getElementById('lightboxImg').src = ''; }
    
    async function manualSync(){
    const btn=document.getElementById('syncBtn');
    if(btn.classList.contains('syncing'))return;
    btn.classList.add('syncing');
    btn.querySelector('.sync-label').textContent='同步中';
    try{
        const{success,error}=await callEdge('manualSync',{target:'all'});
        if(success){
            showToast('✅ 同步完成');
            await loadStudents();
        }else{
            showToast('❌ 同步失敗：'+(error||''));
        }
    }catch(e){showToast('❌ 同步失敗：'+e.message);}
    btn.classList.remove('syncing');
    btn.querySelector('.sync-label').textContent='同步';
}
</script>
