<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>教練管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--green:#7ac19a;--green-dark:#5a9a7a;--green-light:#e8f5ee;--pink:#f2ac98;--pink-light:#fce8e2;--pink-dark:#c67566;--blue:#9fcccc;--blue-light:#e4f2f2;--blue-dark:#6ba3a3;--yellow:#ffe08b;--card:#fff;--text:#333;--text-secondary:#666;--text-muted:#999;--border:#e5e5e5;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans TC',sans-serif;background:linear-gradient(135deg,#e2ede6 0%,#daedec 30%,#faece8 60%,#fcf4e3 100%);background-attachment:fixed;color:var(--text);min-height:100vh;}
.top-card{max-width:600px;margin:12px auto 0;padding:0 12px;}
.top-inner{background:white;border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,0.06);}
.top-main{display:flex;justify-content:space-between;align-items:flex-start;}
.top-main h1{font-size:18px;font-weight:700;color:var(--green-dark);}
.top-sub{font-size:11px;color:var(--text-muted);margin-top:2px;}
.user-badge{display:flex;align-items:center;gap:6px;background:var(--green-light);padding:4px 10px 4px 6px;border-radius:20px;}
.user-avatar{width:24px;height:24px;border-radius:50%;background:var(--green);color:white;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.user-name{font-size:12px;font-weight:600;color:var(--green-dark);}
.quick-stats{display:flex;gap:8px;margin-top:12px;}
.qs{flex:1;background:#f8faf8;border-radius:10px;padding:8px 6px;text-align:center;}
.qs-num{font-size:18px;font-weight:900;color:var(--green-dark);}
.qs-label{font-size:9px;color:var(--text-muted);margin-top:1px;white-space:nowrap;}
.filter-bar{max-width:600px;margin:10px auto 0;padding:0 12px;display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:white;color:var(--text-secondary);cursor:pointer;white-space:nowrap;transition:all 0.2s;}
.filter-chip.active{background:var(--green);color:white;border-color:var(--green);}
.filter-chip .cnt{background:rgba(0,0,0,0.08);padding:1px 6px;border-radius:8px;font-size:10px;margin-left:4px;}
.filter-chip.active .cnt{background:rgba(255,255,255,0.3);}
.action-bar{max-width:600px;margin:8px auto 0;padding:0 12px;display:flex;gap:8px;align-items:center;}
.search-input{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:12px;font-size:14px;font-family:inherit;outline:none;background:white;}
.search-input:focus{border-color:var(--green);}
.btn{padding:10px 16px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s;display:flex;align-items:center;gap:6px;white-space:nowrap;}
.btn:active{transform:scale(0.96);}
.btn-primary{background:linear-gradient(135deg,var(--green-dark),var(--green));color:white;box-shadow:0 2px 8px rgba(122,193,154,0.3);}
.btn-secondary{background:var(--blue-light);color:var(--blue-dark);}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:8px;}
.card-list{max-width:600px;margin:10px auto 0;padding:0 12px 100px;}
.a-card{background:white;border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,0.04);border-left:4px solid var(--green);transition:all 0.2s;cursor:pointer;}
.a-card.inactive{border-left-color:#ccc;opacity:0.7;}
.a-card:active{transform:scale(0.995);}
.a-top{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.a-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;}
.a-avatar.m{background:linear-gradient(135deg,var(--blue-light),#bbdefb);color:var(--blue-dark);}
.a-avatar.f{background:linear-gradient(135deg,var(--pink-light),#f8bbd0);color:var(--pink-dark);}
.a-info{flex:1;min-width:0;}
.a-name{font-size:16px;font-weight:700;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.a-meta{font-size:12px;color:var(--text-muted);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap;}
.a-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;}
.a-tag{padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;}
.a-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;font-size:14px;}
.a-field{display:flex;gap:4px;align-items:baseline;}.a-field-label{color:var(--text-muted);white-space:nowrap;font-size:12px;}.a-field-value{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.a-field.full{grid-column:1/-1;}
.a-expand{display:none;margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);}
.a-card.expanded .a-expand{display:block;}
.a-expand-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;font-size:14px;}
.a-actions{margin-top:10px;display:flex;gap:8px;justify-content:flex-end;}
.a-toggle{text-align:center;margin-top:6px;font-size:10px;color:var(--green);font-weight:600;}
.a-card.expanded .a-toggle{display:none;}
.badge{padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;}
.badge-active{background:var(--green-light);color:var(--green-dark);}.badge-inactive{background:#f5f5f5;color:#999;}
.badge-pilates{background:#e8f5e9;color:#2e7d32;}.badge-weight{background:#e3f2fd;color:#1565c0;}.badge-stretch{background:#fff3e0;color:#e65100;}.badge-ai{background:#f3e5f5;color:#7b1fa2;}
.gender-m{background:var(--blue-light);color:var(--blue-dark);}.gender-f{background:var(--pink-light);color:var(--pink-dark);}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-bg.show{display:flex;}
.modal-panel{width:100%;max-width:500px;max-height:92vh;background:white;border-radius:20px 20px 0 0;overflow-y:auto;animation:slideUp 0.3s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:white;z-index:10;}
.modal-head h2{font-size:16px;font-weight:700;}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted);padding:4px 8px;}
.modal-body{padding:20px;padding-bottom:100px;}
.modal-footer{display:none;position:fixed;bottom:0;left:0;right:0;padding:12px 20px;background:white;border-top:1px solid var(--border);gap:10px;z-index:10;justify-content:flex-end;}
.modal-bg.show .modal-footer{display:flex;}
.form-group{margin-bottom:14px;}.form-label{font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;display:block;}
.form-input,.form-textarea,.form-select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:border-color 0.2s;}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--green);}
.form-textarea{min-height:70px;resize:vertical;}
.checkbox-row{display:flex;gap:10px;flex-wrap:wrap;}.checkbox-item{display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer;}
.detail-section{margin-bottom:16px;}.detail-section-title{font-size:12px;font-weight:700;color:var(--green-dark);margin-bottom:8px;padding-bottom:6px;border-bottom:1.5px solid var(--green-light);}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}.detail-field{font-size:13px;}.detail-field.full{grid-column:1/-1;}
.detail-field-label{font-size:10px;color:var(--text-muted);margin-bottom:1px;}.detail-field-value{font-weight:500;}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);}.empty-icon{font-size:48px;margin-bottom:12px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:white;padding:10px 20px;border-radius:10px;font-size:13px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;max-width:90%;text-align:center;}.toast.show{opacity:1;}
@media(min-width:769px){.modal-bg{align-items:center;}.modal-panel{border-radius:20px;max-height:85vh;}.modal-footer{position:sticky;bottom:0;}}
</style>
</head>
<body>
<div class="top-card"><div class="top-inner">
    <div class="top-main"><div><h1>👨‍🏫 教練管理</h1><div class="top-sub" id="topSub">載入中...</div></div><div class="user-badge"><div class="user-avatar" id="userAvatar">?</div><span class="user-name" id="staffName">-</span></div></div>
    <div class="quick-stats" id="quickStats"></div>
</div></div>
<div class="filter-bar" id="filterBar"></div>
<div class="action-bar"><input type="text" class="search-input" id="searchInput" placeholder="🔍 搜尋教練名稱..." oninput="handleSearch()"><button class="btn btn-primary" id="addBtn" onclick="openAddModal()" style="display:none;">+ 新增</button></div>
<div class="card-list" id="coachList"><div class="empty-state"><div class="empty-icon">⏳</div><p>載入中...</p></div></div>
<div class="modal-bg" id="detailModal"><div class="modal-panel"><div class="modal-head"><h2 id="detailTitle">教練資料</h2><button class="modal-close" onclick="closeModal('detailModal')">✕</button></div><div class="modal-body" id="detailBody"></div><div class="modal-footer" id="detailFooter"></div></div></div>
<div class="modal-bg" id="editModal"><div class="modal-panel"><div class="modal-head"><h2 id="editTitle">編輯教練</h2><button class="modal-close" onclick="closeModal('editModal')">✕</button></div><div class="modal-body" id="editBody"></div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('editModal')">取消</button><button class="btn btn-primary" onclick="saveCoach()">💾 儲存</button></div></div></div>
<div class="toast" id="toast"></div>
<script>
const SUPABASE_URL='https://mnjilhpztnowaplggvkk.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1uamlsaHB6dG5vd2FwbGdndmtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU3MDA0ODYsImV4cCI6MjA4MTI3NjQ4Nn0.X3e9DF3iT2KUR9ma3_Ins01vG607R155v0xia8hO_Qg';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const GAS_URL='https://script.google.com/macros/s/AKfycbyOGRzAKYnSzOc-c8m0Xdy1MPwK3u8z9cRJYUXEfyoB-ZG908nycOk8moGiip_08Rh6cA/exec';
let currentUser=null,modulePerms={view:false,fill:false,edit:false,create:false,delete:false,export:false},fieldPerms={};
let allCoaches=[],filteredCoaches=[],searchTerm='',searchTimeout=null,editingCoach=null,currentFilter='all';
const specNames={pilates:'皮拉提斯',weight:'重量訓練',stretch:'伸展課程',ai:'AI 體態分析'};
const specIcons={pilates:'🧘',weight:'💪',stretch:'🤸',ai:'🤖'};
const specClass={pilates:'badge-pilates',weight:'badge-weight',stretch:'badge-stretch',ai:'badge-ai'};
const genderNames={'male':'男','female':'女','男':'男','女':'女','other':'其他'};
const genderKey=g=>(g==='female'||g==='女')?'f':'m';
const genderNorm=g=>({male:'male',female:'female',other:'other','男':'male','女':'female','其他':'other'}[g]||'');

function initPermissions(){
    try{currentUser=JSON.parse(sessionStorage.getItem('currentStaff'));}catch(e){}
    if(!currentUser){const p=new URLSearchParams(window.location.search);if(p.get('uid'))currentUser={name:p.get('name')||'',role:p.get('role')||'staff'};}
    if(!currentUser){document.getElementById('coachList').innerHTML='<div class="empty-state"><div class="empty-icon">🔒</div><p>請先登入</p></div>';return false;}
    document.getElementById('staffName').textContent=currentUser.name;
    document.getElementById('userAvatar').textContent=(currentUser.name||'?')[0];
    if(currentUser.role==='super_admin'||currentUser.permissions==='all'){modulePerms={view:true,fill:true,edit:true,create:true,delete:false,export:true};}
    else{modulePerms=(currentUser.permissions&&currentUser.permissions['coach'])||{view:false};}
    if(currentUser.role==='super_admin'){fieldPerms={};}else{fieldPerms=(currentUser.fieldPermissions&&currentUser.fieldPermissions['coach'])||{};}
    try{if(window.parent&&window.parent.getModulePermissions)modulePerms=window.parent.getModulePermissions('coach');if(window.parent&&window.parent.getFieldPermissions)fieldPerms=window.parent.getFieldPermissions('coach');}catch(e){}
    if(modulePerms.fill===undefined)modulePerms.fill=modulePerms.edit||false;
    if(modulePerms.create)document.getElementById('addBtn').style.display='flex';
    if(!modulePerms.view){document.getElementById('coachList').innerHTML='<div class="empty-state"><div class="empty-icon">🔒</div><p>無權限</p></div>';return false;}
    return true;
}
function isVis(f){const p=fieldPerms[f];return p===undefined||p===true||p==='masked';}
function isFull(f){const p=fieldPerms[f];return p===undefined||p===true;}
function getFD(f,v,mt){const p=fieldPerms[f];if(p===undefined||p===true)return escHtml(v||'-');if(p===false)return'<span style="color:#ccc;font-size:11px;">無權限</span>';if(p==='masked'){if(!v)return'-';const s=String(v);if(mt==='phone'&&s.length>=7)return escHtml(s.substring(0,4)+'***'+s.substring(s.length-3));return escHtml(s[0]+'***'+s[s.length-1]);}return escHtml(v||'-');}

async function loadCoaches(){
    try{
        const{data,error}=await sb.from('coaches').select('*').order('name');
        if(error)throw error;
        allCoaches=data||[];
        document.getElementById('topSub').textContent='共 '+allCoaches.length+' 位教練';
        renderStats();renderFilters();applyFilter();
    }catch(e){document.getElementById('coachList').innerHTML='<div class="empty-state"><div class="empty-icon">❌</div><p>載入失敗</p></div>';}
}
function renderStats(){
    const active=allCoaches.filter(c=>c.is_active!==false).length;
    const specs={};allCoaches.forEach(c=>{(c.specialties||[]).forEach(s=>{specs[s]=(specs[s]||0)+1;});});
    document.getElementById('quickStats').innerHTML=
        '<div class="qs"><div class="qs-num">'+active+'</div><div class="qs-label">啟用</div></div>'+
        '<div class="qs"><div class="qs-num">'+(specs.pilates||0)+'</div><div class="qs-label">🧘 皮拉提斯</div></div>'+
        '<div class="qs"><div class="qs-num">'+(specs.weight||0)+'</div><div class="qs-label">💪 重訓</div></div>'+
        '<div class="qs"><div class="qs-num">'+(specs.stretch||0)+'</div><div class="qs-label">🤸 伸展</div></div>';
}
function renderFilters(){
    const specs={};allCoaches.forEach(c=>{(c.specialties||[]).forEach(s=>{specs[s]=(specs[s]||0)+1;});});
    let h='<span class="filter-chip active" onclick="setFilter(\'all\',this)">全部<span class="cnt">'+allCoaches.length+'</span></span>';
    Object.keys(specNames).forEach(s=>{if(specs[s])h+='<span class="filter-chip" onclick="setFilter(\''+s+'\',this)">'+specIcons[s]+' '+specNames[s]+'<span class="cnt">'+specs[s]+'</span></span>';});
    document.getElementById('filterBar').innerHTML=h;
}
function setFilter(f,el){currentFilter=f;document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');applyFilter();}
function applyFilter(){
    filteredCoaches=allCoaches.filter(c=>{
        if(currentFilter!=='all'&&!(c.specialties||[]).includes(currentFilter))return false;
        if(searchTerm&&!((c.name||'').includes(searchTerm)||(c.real_name||'').includes(searchTerm)||(c.coach_code||'').includes(searchTerm)))return false;
        return true;
    });
    renderCoaches();
}
function handleSearch(){if(searchTimeout)clearTimeout(searchTimeout);searchTimeout=setTimeout(()=>{searchTerm=document.getElementById('searchInput').value.trim();applyFilter();},300);}

function renderCoaches(){
    const c=document.getElementById('coachList');
    if(filteredCoaches.length===0){c.innerHTML='<div class="empty-state"><div class="empty-icon">👨‍🏫</div><p>找不到教練</p></div>';return;}
    c.innerHTML=filteredCoaches.map(co=>{
        const init=(co.name||'?')[0],gk=genderKey(co.gender),isActive=co.is_active!==false,sid=escAttr(co.id),specs=(co.specialties||[]);
        let tags='';specs.forEach(s=>{tags+='<span class="a-tag '+(specClass[s]||'')+'">'+specIcons[s]+' '+(specNames[s]||s)+'</span>';});
        tags+='<span class="a-tag '+(isActive?'badge-active':'badge-inactive')+'">'+(isActive?'啟用':'停用')+'</span>';
        let grid='';
        if(co.coach_code)grid+=af('編號',escHtml(co.coach_code));
        if(isVis('phone')&&co.phone)grid+=af('電話',getFD('phone',co.phone,'phone'));
        if(co.real_name&&co.real_name!==co.name)grid+=af('本名',escHtml(co.real_name));
        if(genderNames[co.gender])grid+=af('性別',genderNames[co.gender]);
        let exp='';
        if(isVis('email')&&co.email)exp+=af('信箱',getFD('email',co.email));
        if(isVis('birthday')&&co.birthday)exp+=af('生日',escHtml(co.birthday));
        if(co.certifications)exp+=aff('證照',escHtml(co.certifications));
        if(co.notes)exp+=aff('備註',escHtml(co.notes));
        if(isVis('line_uid')&&co.line_uid)exp+=aff('衡點LINE','<span style="font-size:10px;">'+getFD('line_uid',co.line_uid)+'</span>');
        if(isVis('line_id_edu')&&co.line_id_edu)exp+=aff('教務LINE','<span style="font-size:10px;">'+getFD('line_id_edu',co.line_id_edu)+'</span>');
        let acts='<button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();viewDetail(\''+sid+'\')">📋 詳細</button>';
        if(modulePerms.fill||modulePerms.edit)acts+='<button class="btn btn-primary btn-sm" onclick="event.stopPropagation();editCoach(\''+sid+'\')">✏️ 編輯</button>';
        return '<div class="a-card'+(isActive?'':' inactive')+'" id="card-'+sid+'" onclick="toggleCard(\''+sid+'\')"><div class="a-top"><div class="a-avatar '+gk+'">'+escHtml(init)+'</div><div class="a-info"><div class="a-name">'+escHtml(co.name)+(co.real_name&&co.real_name!==co.name?' <span style="font-size:12px;color:var(--text-muted);">('+escHtml(co.real_name)+')</span>':'')+'</div><div class="a-meta"><span>'+(co.coach_code||co.id.substring(0,8))+'</span>'+specs.map(s=>'<span>'+(specNames[s]||s)+'</span>').join('')+'</div></div></div><div class="a-tags">'+tags+'</div><div class="a-grid">'+grid+'</div><div class="a-expand"><div class="a-expand-grid">'+exp+'</div><div class="a-actions">'+acts+'</div></div><div class="a-toggle">▼ 展開更多</div></div>';
    }).join('');
}
function af(l,v){return '<div class="a-field"><span class="a-field-label">'+l+'</span><span class="a-field-value">'+v+'</span></div>';}
function aff(l,v){return '<div class="a-field full"><span class="a-field-label">'+l+'</span><span class="a-field-value" style="white-space:normal;">'+v+'</span></div>';}
function toggleCard(id){const c=document.getElementById('card-'+id);if(c)c.classList.toggle('expanded');}

function viewDetail(id){
    const co=allCoaches.find(x=>x.id===id);if(!co)return;
    document.getElementById('detailTitle').textContent=co.name;
    let h='<div class="detail-section"><div class="detail-section-title">基本資訊</div><div class="detail-grid">';
    h+=ddf('編號',escHtml(co.coach_code||co.id));h+=ddf('教練名稱',escHtml(co.name));
    if(co.real_name)h+=ddf('本名',escHtml(co.real_name));h+=ddf('性別',genderNames[co.gender]||'-');
    if(isVis('birthday'))h+=ddf('生日',getFD('birthday',co.birthday));
    h+=ddf('狀態',co.is_active!==false?'啟用':'停用');
    h+=ddf('課程類型',(co.specialties||[]).map(s=>(specIcons[s]||'')+' '+(specNames[s]||s)).join(', ')||'-',true);
    h+='</div></div><div class="detail-section"><div class="detail-section-title">聯絡方式</div><div class="detail-grid">';
    if(isVis('phone'))h+=ddf('電話',getFD('phone',co.phone,'phone'));
    if(isVis('email'))h+=ddf('信箱',getFD('email',co.email));
    if(isVis('line_uid'))h+=ddf('衡點LINE',getFD('line_uid',co.line_uid),true);
    if(isVis('line_id_edu'))h+=ddf('教務LINE',getFD('line_id_edu',co.line_id_edu),true);
    h+='</div></div>';
    if(co.certifications||co.notes){h+='<div class="detail-section"><div class="detail-section-title">其他</div><div class="detail-grid">';if(co.certifications)h+=ddf('證照紀錄',escHtml(co.certifications),true);if(co.notes)h+=ddf('備註',escHtml(co.notes),true);h+='</div></div>';}
    h+='<div class="detail-section"><div class="detail-section-title">系統</div><div class="detail-grid">';h+=ddf('建立',fmtDate(co.created_at));h+=ddf('更新',fmtDate(co.updated_at));h+='</div></div>';
    document.getElementById('detailBody').innerHTML=h;
    let fh='';if(modulePerms.fill||modulePerms.edit)fh='<button class="btn btn-primary" onclick="closeModal(\'detailModal\');editCoach(\''+escAttr(co.id)+'\')">✏️ 編輯</button>';
    document.getElementById('detailFooter').innerHTML=fh;openModal('detailModal');
}
function ddf(l,v,full){return '<div class="detail-field'+(full?' full':'')+'"><div class="detail-field-label">'+l+'</div><div class="detail-field-value">'+(v||'-')+'</div></div>';}

function editCoach(id){
    if(!modulePerms.fill&&!modulePerms.edit){showToast('無編輯權限');return;}
    const co=allCoaches.find(x=>x.id===id);if(!co)return;editingCoach=co;
    document.getElementById('editTitle').textContent='編輯：'+co.name;
    function ro(v){if(!v||v==='-')return !modulePerms.fill;return !modulePerms.edit;}
    let h='';
    h+=fg('教練編號','text','e_code',co.coach_code||co.id,true);
    h+=fg('教練名稱','text','e_name',co.name,true);
    h+=fg('本名','text','e_rname',co.real_name,ro(co.real_name));
    h+=fsel('性別','e_gender',[['','請選擇'],['male','男'],['female','女'],['other','其他']],genderNorm(co.gender),ro(co.gender));
    if(isFull('phone'))h+=fg('電話','tel','e_phone',co.phone,ro(co.phone));
    if(isFull('email'))h+=fg('信箱','email','e_email',co.email,ro(co.email));
    if(isFull('birthday'))h+=fg('生日','date','e_bday',co.birthday,ro(co.birthday));
    if(isFull('line_uid'))h+=fg('衡點LINE','text','e_luid',co.line_uid,true);
    if(isFull('line_id_edu'))h+=fg('教務LINE','text','e_ledu',co.line_id_edu,true);
    h+='<div class="form-group"><label class="form-label">課程類型</label><div class="checkbox-row">';
    ['pilates','weight','stretch','ai'].forEach(s=>{h+='<label class="checkbox-item"><input type="checkbox" id="e_spec_'+s+'" '+((co.specialties||[]).includes(s)?'checked':'')+'>'+specIcons[s]+' '+specNames[s]+'</label>';});
    h+='</div></div>';
    h+=fsel('狀態','e_active',[['true','啟用'],['false','停用']],String(co.is_active!==false));
    h+=fta('證照紀錄','e_cert',co.certifications,ro(co.certifications));
    h+=fta('備註','e_notes',co.notes,ro(co.notes));
    document.getElementById('editBody').innerHTML=h;openModal('editModal');
}
async function saveCoach(){
    if(!editingCoach)return;const co=editingCoach;const u={};
    const rn=val('e_rname');if(rn!==(co.real_name||''))u.real_name=rn;
    const gv=val('e_gender');if(gv!==genderNorm(co.gender))u.gender=gv;
    const av=val('e_active');if(av!==String(co.is_active!==false))u.is_active=av==='true';
    const cv=val('e_cert');if(cv!==(co.certifications||''))u.certifications=cv;
    const nv=val('e_notes');if(nv!==(co.notes||''))u.notes=nv;
    const specs=[];['pilates','weight','stretch','ai'].forEach(s=>{if(document.getElementById('e_spec_'+s)?.checked)specs.push(s);});
    if(JSON.stringify(specs.sort())!==JSON.stringify((co.specialties||[]).sort()))u.specialties=specs;
    const pe=document.getElementById('e_phone');if(pe&&!pe.readOnly){const pv=pe.value.trim();if(pv!==(co.phone||''))u.phone=pv;}
    const ee=document.getElementById('e_email');if(ee&&!ee.readOnly){const ev=ee.value.trim();if(ev!==(co.email||''))u.email=ev;}
    const be=document.getElementById('e_bday');if(be&&!be.readOnly){const bv=be.value.trim();if(bv!==(co.birthday||''))u.birthday=bv||null;}
    if(Object.keys(u).length===0){showToast('沒有變更');closeModal('editModal');return;}
    try{showToast('⏳ 儲存中...');const gf=Object.assign({},u);gf.name=co.name;gf.line_uid=co.line_uid||'';const r=await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'updateCoach',fields:gf})});const j=await r.json();if(!j.success){showToast('❌ 回寫失敗：'+(j.error||''));return;}}catch(e){showToast('❌ 回寫失敗：'+e.message);return;}
    try{u.updated_at=new Date().toISOString();const{error}=await sb.from('coaches').update(u).eq('id',co.id);if(error)throw error;showToast('✅ 已更新');closeModal('editModal');editingCoach=null;await loadCoaches();}catch(e){showToast('⚠️ Sheet/MySQL已更新但Supabase失敗');}
}
function openAddModal(){if(!modulePerms.create){showToast('無新增權限');return;}editingCoach=null;document.getElementById('editTitle').textContent='新增教練';let h='';h+=fg('教練名稱 *','text','e_name','');h+=fg('本名','text','e_rname','');h+=fsel('性別','e_gender',[['','請選擇'],['male','男'],['female','女'],['other','其他']],'');h+=fg('電話','tel','e_phone','');h+=fg('信箱','email','e_email','');h+=fg('生日','date','e_bday','');h+='<div class="form-group"><label class="form-label">課程類型</label><div class="checkbox-row">';['pilates','weight','stretch','ai'].forEach(s=>{h+='<label class="checkbox-item"><input type="checkbox" id="e_spec_'+s+'">'+specIcons[s]+' '+specNames[s]+'</label>';});h+='</div></div>';h+=fsel('狀態','e_active',[['true','啟用'],['false','停用']],'true');h+=fta('證照紀錄','e_cert','');h+=fta('備註','e_notes','');document.getElementById('editBody').innerHTML=h;openModal('editModal');}

function openModal(id){document.getElementById(id).classList.add('show');}
function closeModal(id){const el=document.getElementById(id);if(el)el.classList.remove('show');}
function fg(l,t,id,v,ro){var s=ro?'readonly style="background:#f0f0f0;cursor:not-allowed;color:#888;"':'';return '<div class="form-group"><label class="form-label">'+l+(ro?' 🔒':'')+'</label><input type="'+t+'" class="form-input" id="'+id+'" value="'+escAttr(v||'')+'" '+s+'></div>';}
function fta(l,id,v,ro){if(ro)return '<div class="form-group"><label class="form-label">'+l+' 🔒</label><textarea class="form-textarea" id="'+id+'" readonly style="background:#f0f0f0;cursor:not-allowed;color:#888;">'+escHtml(v||'')+'</textarea></div>';return '<div class="form-group"><label class="form-label">'+l+'</label><textarea class="form-textarea" id="'+id+'">'+escHtml(v||'')+'</textarea></div>';}
function fsel(l,id,opts,sel,ro){if(ro){var sv=opts.find(function(o){return o[0]===sel;});return '<div class="form-group"><label class="form-label">'+l+' 🔒</label><input type="text" class="form-input" id="'+id+'" value="'+escAttr(sv?sv[1]:(sel||''))+'" readonly style="background:#f0f0f0;cursor:not-allowed;color:#888;"></div>';}return '<div class="form-group"><label class="form-label">'+l+'</label><select class="form-select" id="'+id+'">'+opts.map(function(o){return '<option value="'+o[0]+'" '+(o[0]===sel?'selected':'')+'>'+o[1]+'</option>';}).join('')+'</select></div>';}
function val(id){const e=document.getElementById(id);return e?e.value.trim():'';}
function escHtml(t){if(t==null)return'';const d=document.createElement('div');d.textContent=String(t);return d.innerHTML;}
function escAttr(t){if(t==null)return'';return String(t).replace(/&/g,'&amp;').replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(d){if(!d)return'-';try{const dt=new Date(d);return dt.getFullYear()+'/'+(dt.getMonth()+1)+'/'+dt.getDate()+' '+String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0');}catch(e){return d;}}
let toastTimer=null;function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');if(toastTimer)clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2500);}
document.querySelectorAll('.modal-bg').forEach(el=>{el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('show');});});
document.addEventListener('DOMContentLoaded',()=>{if(initPermissions())loadCoaches();});
</script>
</body>
